name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout at tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Derive version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Verify .gaia/VERSION matches tag
        run: |
          FILE_VERSION=$(cat .gaia/VERSION | tr -d '[:space:]')
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match .gaia/VERSION ($FILE_VERSION). Run /gaia-release before tagging."
            exit 1
          fi

      - name: Extract CHANGELOG section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract from "## [$VERSION]" up to (but not including) the next "## [" heading.
          awk -v ver="$VERSION" '
            $0 ~ "^## \\["ver"\\]" { found=1; print; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::Could not find '## [$VERSION]' section in CHANGELOG.md"
            exit 1
          fi
          echo "notes-path=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Verify manifest is fresh
        run: ./.gaia/cli/gaia-maintainer release manifest --check

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install CLI dependencies
        run: pnpm -C .gaia/cli install --frozen-lockfile

      - name: Verify committed CLI binaries are rebuilt from src
        run: |
          cp .gaia/cli/gaia /tmp/gaia-committed
          cp .gaia/cli/gaia-maintainer /tmp/gaia-maintainer-committed
          pnpm -C .gaia/cli bundle
          if ! cmp -s /tmp/gaia-committed .gaia/cli/gaia; then
            echo "::error::.gaia/cli/gaia is stale: rebuilding from src (pnpm -C .gaia/cli bundle) produces a different binary. Run the bundle and commit the result." >&2
            exit 1
          fi
          if ! cmp -s /tmp/gaia-maintainer-committed .gaia/cli/gaia-maintainer; then
            echo "::error::.gaia/cli/gaia-maintainer is stale: rebuilding from src (pnpm -C .gaia/cli bundle) produces a different binary. Run the bundle and commit the result." >&2
            exit 1
          fi

      - name: Stage release tree
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          # Drive the staged file set from `git ls-files` so it only
          # contains tracked files (no .DS_Store, node_modules, build
          # artifacts, etc.), then filter out paths matched by
          # .gaia/release-exclude.
          git ls-files > /tmp/all-tracked.txt
          # The sed expression escapes regex metacharacters literally; its
          # single quotes are intentional (double quotes would make the shell
          # expand the `$()` inside the character class and corrupt the
          # pattern). SC2016 is a false positive here.
          # shellcheck disable=SC2016
          awk '/^[[:space:]]*#/ {next} NF==0 {next} {print}' .gaia/release-exclude \
            | sed 's|[][\\.*^$()+?{}|]|\\&|g' \
            | awk '{print "^"$0"(/|$)"}' \
            > /tmp/exclude-regex.txt
          if [ -s /tmp/exclude-regex.txt ]; then
            grep -vE -f /tmp/exclude-regex.txt /tmp/all-tracked.txt > /tmp/include.txt
          else
            cp /tmp/all-tracked.txt /tmp/include.txt
          fi
          STAGING="/tmp/gaia-${TAG}"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          rsync -a --files-from=/tmp/include.txt . "$STAGING"/
          echo "Staged $(find "$STAGING" -type f | wc -l) files into $STAGING"

      - name: Bundle-time scrub (marker-strip + leak-check)
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ./.gaia/cli/gaia-maintainer release scrub "/tmp/gaia-${TAG}"

      - name: Verify runtime dependencies
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ./.gaia/cli/gaia-maintainer release runtime-deps --staging "/tmp/gaia-${TAG}"

      # Pre-publish distribution-test gate. Runs Layers 0+1+2 against an
      # independently-staged tree (build-staging.sh re-runs the same
      # ls-files + exclude + scrub + runtime-deps the steps above did).
      # If any scenario fails the release halts before the tarball is
      # uploaded and `gh release create` runs, so a broken release
      # cannot publish. ~3-4 min on ubuntu-latest, $0 on Claude Max via
      # the org OAuth token. Node/pnpm are already set up above (needed
      # earlier for the CLI binary rebuild-freshness check).
      - name: Distribution test gate (Layers 0+1+2)
        timeout-minutes: 15
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: bash .gaia/tests/distribution/run-all.sh

      - name: Build tarball
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          tar -czf "gaia-${TAG}.tar.gz" -C /tmp "gaia-${TAG}"
          echo "Tarball contents (first 30):"
          tar -tzf "gaia-${TAG}.tar.gz" | head -30
          echo "Total entries: $(tar -tzf gaia-${TAG}.tar.gz | wc -l)"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" \
            "gaia-${TAG}.tar.gz" \
            --title "$TAG" \
            --notes-file release-notes.md
