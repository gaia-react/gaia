name: Required Checks Drift

# Advisory-only drift detector for #807: the checks this repo deliberately
# requires to merge (.gaia/scripts/verify-required-checks.sh's
# REQUIRED_CONTEXTS) versus the live branch ruleset's required_status_checks.
# The ruleset lives GitHub-side and can drift silently -- a check can report
# red without blocking a merge if it was never added to the ruleset, which is
# exactly how PR #800 landed with a failing distribution-audit-pr.yml run.
#
# Deliberately NOT added to the ruleset's own required_status_checks: adding a
# check there is a maintainer-run, ask-first cutover
# (.gaia/scripts/read-audit-ci-config.sh documents the same rule for
# GAIA-Audit), not something this drift-detector should do to itself. This
# job surfaces drift for a human to act on; it never mutates the live
# ruleset.
#
# Maintainer-only: REQUIRED_CONTEXTS and the live ruleset it reads both belong
# to the GAIA team's own repo. Release-excluded alongside the other
# maintainer-only workflows (category 9); on an adopter clone this would be a
# silent passenger at best and a confusing red check at worst.
#
# Pinned action SHA matches the sibling maintainer workflows:
#   actions/checkout @ 93cb6efe18208431cddfb8368fd83d5badbf9bfd (v5.0.1)

# No `push:` trigger, matching distribution-audit-pr.yml and shell-lint.yml:
# the job only ever has something to say about a proposed change to the
# workflows or the ruleset, and a push-to-main run would be a skipped no-op
# cluttering the dashboard. Merges all land via PR, so the PR run is the gate.
on:
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-required-checks:
    name: Required checks drift (advisory)
    runs-on: ubuntu-latest
    # Read-only token: this job reads the ruleset and reports, it never
    # writes to the repo or the ruleset.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      # PRs that touch neither the workflows directory nor the script itself
      # report this check green without running anything: nothing about the
      # declared-required set or the check-producing job list could have
      # drifted.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            relevant:
              - '.github/workflows/**'
              - '.gaia/scripts/verify-required-checks.sh'
      - if: steps.filter.outputs.relevant == 'true'
        name: Verify required-checks drift
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .gaia/scripts/verify-required-checks.sh
