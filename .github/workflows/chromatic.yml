name: Chromatic

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default-deny, so a job added later inherits no scope rather than the
# repository default. Each job below grants exactly what it needs.
permissions: {}

jobs:
  has-chromatic-token:
    name: Check for Chromatic token
    runs-on: ubuntu-latest
    # Reads a secret's presence and echoes a boolean. No API calls, no token.
    permissions: {}
    outputs:
      present: ${{ steps.check.outputs.present }}
    steps:
      - id: check
        env:
          HAS_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN != '' }}
        run: echo "present=$HAS_TOKEN" >> "$GITHUB_OUTPUT"

  chromatic:
    name: Run Chromatic
    needs: has-chromatic-token
    if: needs.has-chromatic-token.outputs.present == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    # `contents: read` is the complete set, not an under-scoped starting point.
    # Checkout needs it to clone, and paths-filter and setup-node both default
    # their `token` input to `github.token` for the compare API and the
    # node-versions download. chromaui/action calls no GitHub API and takes no
    # token: Chromatic authenticates with `projectToken`, and its commit
    # statuses arrive through the Chromatic GitHub App installation. Nothing
    # here needs write, so do not widen this when Chromatic statuses misbehave.
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
      # Pre-verified dep-bump PRs (the /update-deps wrapper runs the full
      # quality gate locally before pushing) skip Chromatic. This workflow
      # triggers on `push`, so the gate inspects the HEAD commit subject
      # rather than the PR title. Pattern is restricted to `chore(deps):`
      # and `chore(deps-dev):` so other chore commits still run Chromatic.
      - name: Check chore-deps commit
        id: chore-deps
        run: |
          set -eu
          subject=$(git log -1 --format=%s HEAD)
          if printf '%s' "$subject" | grep -qE '^chore\(deps(-dev)?\):'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      # Allowlist of paths that can affect a Storybook build. Anything outside
      # this list reports the required check green without running Chromatic.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        if: steps.chore-deps.outputs.skip == 'false'
        id: filter
        with:
          filters: |
            code:
              - 'app/**'
              - '.storybook/**'
              - 'public/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'vite.config.*'
              - '.github/workflows/chromatic.yml'
      - if: steps.chore-deps.outputs.skip == 'false' && steps.filter.outputs.code == 'true'
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
      - if: steps.chore-deps.outputs.skip == 'false' && steps.filter.outputs.code == 'true'
        name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      - if: steps.chore-deps.outputs.skip == 'false' && steps.filter.outputs.code == 'true'
        name: Install dependencies
        run: pnpm install --frozen-lockfile
      - if: steps.chore-deps.outputs.skip == 'false' && steps.filter.outputs.code == 'true'
        name: get-npm-version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@3cf273023a0dda27efcd3164bdfb51908dd46a5b # v1.3.1
      - if: steps.chore-deps.outputs.skip == 'false' && steps.filter.outputs.code == 'true'
        name: Run Chromatic
        uses: chromaui/action@8d925269a481085d451544f6bd9aa2ab3af55b5d # v16.9.1
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true
          exitOnceUploaded: true
          autoAcceptChanges: 'main'
          onlyChanged: true
          externals: 'app/styles/tailwind.css'
        env:
          SB: 1
          API_URL: ${{ secrets.API_URL || 'http://localhost:3000/api' }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          MSW_ENABLED: ${{ secrets.MSW_ENABLED || 'true' }}
          npm_package_version: ${{ steps.package-version.outputs.current-version}}
          # Storybook never signs a cookie, so this only has to satisfy the
          # required z.string() in app/env.server.ts. Keep it a literal: the real
          # secret has no reason to enter a build that publishes a public artifact.
          SESSION_SECRET: 'storybook-placeholder-not-used-for-signing'
          SITE_URL: ${{ secrets.SITE_URL || 'http://localhost:3000' }}
