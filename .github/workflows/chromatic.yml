name: Chromatic

on: push

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  has-chromatic-token:
    name: Check for Chromatic token
    runs-on: ubuntu-latest
    outputs:
      present: ${{ steps.check.outputs.present }}
    steps:
      - id: check
        env:
          HAS_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN != '' }}
        run: echo "present=$HAS_TOKEN" >> "$GITHUB_OUTPUT"

  chromatic:
    name: Run Chromatic
    needs: has-chromatic-token
    if: needs.has-chromatic-token.outputs.present == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # Allowlist of paths that can affect a Storybook build. Anything outside
      # this list reports the required check green without running Chromatic.
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'app/**'
              - '.storybook/**'
              - 'public/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'vite.config.*'
              - '.github/workflows/chromatic.yml'
      - if: steps.filter.outputs.code == 'true'
        uses: pnpm/action-setup@v4
      - if: steps.filter.outputs.code == 'true'
        name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      - if: steps.filter.outputs.code == 'true'
        name: Install dependencies
        run: pnpm install --frozen-lockfile
      - if: steps.filter.outputs.code == 'true'
        name: get-npm-version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@v1.3.1
      - if: steps.filter.outputs.code == 'true'
        name: Run Chromatic
        uses: chromaui/action@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true
          exitOnceUploaded: true
          autoAcceptChanges: 'main'
          onlyChanged: true
          externals: 'app/styles/tailwind.css'
        env:
          SB: 1
          API_URL: ${{ secrets.API_URL || 'http://localhost:3000/api' }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          MSW_ENABLED: ${{ secrets.MSW_ENABLED || 'true' }}
          npm_package_version: ${{ steps.package-version.outputs.current-version}}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET || 'ci-placeholder-session-secret-not-real' }}
          SITE_URL: ${{ secrets.SITE_URL || 'http://localhost:3000' }}
