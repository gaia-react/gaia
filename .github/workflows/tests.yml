name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Vitest and Playwright
    if: github.event_name == 'pull_request'
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      # Fallback placeholders let PRs from forks (which can't read repo secrets) still run the suite.
      # MSW intercepts outbound HTTP so the real API_URL is not needed; SESSION_SECRET just needs to be non-empty.
      API_URL: ${{ secrets.API_URL || 'http://localhost:3000/api' }}
      MSW_ENABLED: ${{ secrets.MSW_ENABLED || 'true' }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET || 'ci-placeholder-session-secret-not-real' }}
      SITE_URL: ${{ secrets.SITE_URL || 'http://localhost:3000' }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
      # Allowlist of paths that affect the test suite. Anything outside this
      # list reports the required check green without running. Skipped jobs do
      # not satisfy required checks under classic branch protection, so we
      # gate steps instead.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - 'app/**'
              - 'test/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'vite.config.*'
              - 'vitest.config.*'
              - 'playwright.config.*'
              - 'eslint.config.*'
              - '.node-version'
              - '.github/workflows/tests.yml'
      - if: steps.filter.outputs.code == 'true'
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
      - if: steps.filter.outputs.code == 'true'
        name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      - if: steps.filter.outputs.code == 'true'
        name: Install dependencies
        run: pnpm install --frozen-lockfile
      - if: steps.filter.outputs.code == 'true'
        name: get-npm-version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@3cf273023a0dda27efcd3164bdfb51908dd46a5b # v1.3.1
      - if: steps.filter.outputs.code == 'true'
        name: Typecheck
        run: pnpm typecheck
      - if: steps.filter.outputs.code == 'true'
        name: Lint
        run: pnpm lint-dry
      - if: steps.filter.outputs.code == 'true'
        name: Run Vitest tests
        run: pnpm test:ci
        env:
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          npm_package_version: ${{ steps.package-version.outputs.current-version}}
      - if: steps.filter.outputs.code == 'true'
        name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - if: steps.filter.outputs.code == 'true'
        name: Run Playwright tests
        run: pnpm exec playwright test --pass-with-no-tests
        env:
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          npm_package_version: ${{ steps.package-version.outputs.current-version}}
      - if: ${{ failure() && steps.filter.outputs.code == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        name: Upload Playwright failed test traces
        with:
          name: playwright-traces
          path: .playwright/output
          retention-days: 5
