name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Vitest and Playwright
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # `checks: read` lets resolve-check-base.sh query prior commits' check-runs
      # to find the last commit this check passed on (incremental scope).
      checks: read
    env:
      # Fallback placeholders let PRs from forks (which can't read repo secrets) still run the suite.
      # MSW intercepts outbound HTTP so the real API_URL is not needed; SESSION_SECRET just needs to be non-empty.
      API_URL: ${{ secrets.API_URL || 'http://localhost:3000/api' }}
      MSW_ENABLED: ${{ secrets.MSW_ENABLED || 'true' }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET || 'ci-placeholder-session-secret-not-real' }}
      SITE_URL: ${{ secrets.SITE_URL || 'http://localhost:3000' }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
      # react-doctor resolves the highest-precedence config file and silently
      # ignores the rest, so a stray duplicate (e.g. doctor.config.json beside
      # doctor.config.ts) shadows the canonical config with no warning. Backstop
      # for the pre-commit guard of the same name (.husky/pre-commit). Runs
      # unconditionally so a duplicate fails even when the suite below is gated
      # off by the chore-deps / incremental-delta checks.
      - name: Assert a single react-doctor config
        run: |
          set -eu
          n=$(find . -maxdepth 1 -type f \( -name 'doctor.config.*' -o -name 'react-doctor.config.*' \) | wc -l | tr -d ' ')
          if [ "$n" -gt 1 ]; then
            echo "::error::Multiple react-doctor configs found; keep only doctor.config.ts"
            find . -maxdepth 1 -type f \( -name 'doctor.config.*' -o -name 'react-doctor.config.*' \)
            exit 1
          fi
          echo "OK: ${n} react-doctor config file(s)"
      # Pre-verified dep-bump PRs (the /update-deps wrapper runs the full
      # quality gate locally before pushing) skip the CI suite. Title-pattern
      # gate is restricted to `chore(deps):` and `chore(deps-dev):` so other
      # chore PRs still run normally. Skipped jobs do not satisfy required
      # checks under classic branch protection, so we gate steps instead.
      - name: Check chore-deps title
        id: chore-deps
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "pull_request" ] \
              && printf '%s' "$PR_TITLE" | grep -qE '^chore\(deps(-dev)?\):'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      # Incremental scope: resolve the most recent ancestor of HEAD on which
      # "Vitest and Playwright" already passed, then gate the suite on whether
      # the delta SINCE that green run touches a test-relevant file. A code
      # commit that passes followed by a prose-only commit reviews an empty
      # relevant delta and skips. Falls back to origin/main (full scope) when
      # no green ancestor exists, first run, prior runs failed/cancelled, or
      # the API is unreachable (e.g. fork PRs without a token). Skipped jobs do
      # not satisfy required checks under branch protection, so we gate steps.
      - name: Resolve last-green base
        id: base
        if: steps.chore-deps.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          base="$(bash .github/audit/resolve-check-base.sh 'Vitest and Playwright' || echo origin/main)"
          echo "base=${base}" >> "$GITHUB_OUTPUT"
          echo "tests: incremental base = ${base}" >&2
      # Allowlist of paths that affect the test suite (ERE, matched against
      # `git diff --name-only`; mirrors the prior dorny globs 1:1). Anything
      # outside this list reports the required check green without running.
      - name: Detect test-relevant changes in the incremental delta
        id: filter
        if: steps.chore-deps.outputs.skip == 'false'
        env:
          CHECK_BASE: ${{ steps.base.outputs.base }}
        run: |
          set -eu
          changed=$(git diff --name-only "${CHECK_BASE}...HEAD")
          pattern='^(app|test)/|^(package\.json|pnpm-lock\.yaml|\.node-version)$|^tsconfig[^/]*\.json$|^(vite|vitest|playwright|eslint)\.config\.|^\.github/workflows/tests\.yml$'
          if printf '%s\n' "$changed" | grep -qE "$pattern"; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.chore-deps.outputs.skip == 'false' && steps.filter.outputs.code == 'true'
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
      - if: steps.chore-deps.outputs.skip == 'false' && steps.filter.outputs.code == 'true'
        name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      - if: steps.chore-deps.outputs.skip == 'false' && steps.filter.outputs.code == 'true'
        name: Install dependencies
        run: pnpm install --frozen-lockfile
      - if: steps.chore-deps.outputs.skip == 'false' && steps.filter.outputs.code == 'true'
        name: get-npm-version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@3cf273023a0dda27efcd3164bdfb51908dd46a5b # v1.3.1
      - if: steps.chore-deps.outputs.skip == 'false' && steps.filter.outputs.code == 'true'
        name: Typecheck
        run: pnpm typecheck
      - if: steps.chore-deps.outputs.skip == 'false' && steps.filter.outputs.code == 'true'
        name: Lint
        run: pnpm lint-dry
      - if: steps.chore-deps.outputs.skip == 'false' && steps.filter.outputs.code == 'true'
        name: Run Vitest tests
        run: pnpm test:ci
        env:
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          npm_package_version: ${{ steps.package-version.outputs.current-version}}
      - if: steps.chore-deps.outputs.skip == 'false' && steps.filter.outputs.code == 'true'
        name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - if: steps.chore-deps.outputs.skip == 'false' && steps.filter.outputs.code == 'true'
        name: Run Playwright tests
        run: pnpm exec playwright test --pass-with-no-tests
        env:
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          npm_package_version: ${{ steps.package-version.outputs.current-version}}
      - if: ${{ failure() && steps.chore-deps.outputs.skip == 'false' && steps.filter.outputs.code == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        name: Upload Playwright failed test traces
        with:
          name: playwright-traces
          path: .playwright/output
          retention-days: 5
