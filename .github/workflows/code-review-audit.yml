name: Code Review Audit

# Pre-merge gate that runs the `code-review-audit` agent
# (.claude/agents/code-review-audit.md) against the PR diff. Skipped when
# (a) the PR HEAD already carries a matching `GAIA-Audit:` commit trailer
# (locally-stamped audit), (b) the un-audited delta (since the last clean
# audit) contains no audit-relevant files (wiki, instruction files, and
# other prose-only surfaces are out of scope), or (c) the PR modifies this
# workflow file itself
# (claude-code-action's workflow-validation guardrail would refuse to
# run, so the audit cannot complete regardless). Adopter-tunable knobs
# live at .gaia/audit-ci.yml.
#
# Per-author mode (local vs ci): the "Resolve audit decision" step calls the
# shared resolver (.gaia/scripts/read-audit-ci-config.sh --resolve-author)
# with the PR author and override-label presence. When it resolves `local`
# with no override AND the change is in audit scope, CI stands down: it spends
# no audit tokens and the "Stand down" step posts a `pending` GAIA-Audit status
# (no cleared-shaped description) so the merge stays blocked until the local
# merge path runs the audit and clears it. Every expensive step and the
# audit-downstream stamps gain `&& should_run == 'true'`; the resolution is
# subordinate to the scope gates (it only runs in-scope and not self-modifying),
# so out-of-scope / self-mod PRs take the existing success-stamp paths unchanged
# and never also post a stand-down.
#
# Required-check semantics under classic branch protection: the job is
# green-by-design on every code path (including a local-mode stand-down where
# no audit ran); the GATE is the `GAIA-Audit` commit STATUS, not the job name.
# Each path still reaches a terminal "set check status / comment" step so the
# job concludes cleanly. A `pending` GAIA-Audit status (the stand-down) blocks
# the merge button; a `success` status with HEAD's version+tree clears it. All
# gating is expressed at the step level (mirrors `.github/workflows/tests.yml`).
#
# Third-party actions are pinned to full-length commit SHAs (resolved tag in parens):
#   actions/checkout              @ 93cb6efe18208431cddfb8368fd83d5badbf9bfd (v5.0.1)
#   pnpm/action-setup             @ 8912a9102ac27614460f54aedde9e1e7f9aec20d (v6.0.5)
#   actions/setup-node            @ a0853c24544627f65ddf259abe73b1d18a591444 (v5.0.0)
#   anthropics/claude-code-action @ 63322d7b2bc79e7b621b89f41b53ceb8e5a5d314 (v1.0)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions: {}

concurrency:
  group: code-review-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  code-review-audit:
    name: code-audit-frontend
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      statuses: write
      id-token: write
      # `actions: write` lets the self-heal re-trigger step dispatch
      # required workflows on the PR branch after pushing self-heal
      # commits. `checks: write` lets it stamp a `code-review-audit`
      # check run on the new HEAD so branch protection accepts the
      # already-audited tree without re-running this workflow.
      actions: write
      checks: write
      # `issues: write` lets the agent file out-of-scope findings as
      # deduped, severity-labeled `tech-debt` disposition issues (and
      # create the `tech-debt`/`severity:*`/`wontfix` labels) from CI.
      # The top-level `permissions: {}` stays default-deny; this grant
      # is job-scoped, matching the existing pattern.
      issues: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_BRANCH: ${{ github.event.pull_request.head.ref }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Read audit-ci config
        id: config
        run: bash .gaia/scripts/read-audit-ci-config.sh >> "$GITHUB_OUTPUT"

      - name: Check gate label
        id: gate
        env:
          GATE_LABEL: ${{ steps.config.outputs.gate_label }}
          PR_LABELS_JSON: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          set -eu
          if [ -z "$GATE_LABEL" ]; then
            {
              echo "gated=false"
              echo "reason=no-gate-label-configured"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if printf '%s' "$PR_LABELS_JSON" \
              | jq -e --arg l "$GATE_LABEL" 'index($l)' >/dev/null; then
            {
              echo "gated=false"
              echo "reason=label-present"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "gated=true"
              echo "reason=label-missing"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Check chore-deps title
        id: chore-deps
        if: steps.gate.outputs.gated == 'false'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -eu
          # Pre-verified dep-bump PRs (the /update-deps wrapper runs the full
          # quality gate locally before pushing) skip the audit. Pattern is
          # restricted to `chore(deps):` and `chore(deps-dev):` so other chore
          # PRs still run.
          if printf '%s' "$PR_TITLE" | grep -qE '^chore\(deps(-dev)?\):'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve audit base
        id: base
        if: |
          steps.gate.outputs.gated == 'false' &&
          steps.chore-deps.outputs.skip == 'false'
        run: |
          set -eu
          # Incremental scope: resolve the most recent ancestor on this PR that
          # already passed a CLEAN audit under the current agent version
          # (proven by a GAIA-Audit commit trailer or commit status). Resolved
          # here, before the source-change check, so that check and the audit
          # share one base: everything before <base> was already cleared. Falls
          # back to origin/main (full PR scope) when no audited ancestor exists
          # (first audit, prior runs cancelled/failed, or a .gaia/VERSION bump
          # invalidated them). A helper failure must never fail the audit;
          # default to full scope.
          base="$(bash .github/audit/resolve-audit-base.sh || echo origin/main)"
          echo "base=${base}" >> "$GITHUB_OUTPUT"
          echo "code-review-audit: incremental review base = ${base}" >&2

      - name: Check for source-code changes
        id: source-changes
        if: |
          steps.gate.outputs.gated == 'false' &&
          steps.chore-deps.outputs.skip == 'false'
        env:
          AUDIT_BASE: ${{ steps.base.outputs.base }}
        run: |
          set -eu
          # Audit-relevant scope: TS/TSX/CSS code under app/, tests,
          # .storybook configs, GitHub workflow files, and root-level
          # build/lint/test/typecheck configs. PRs whose UN-AUDITED DELTA
          # (<audit-base>...HEAD) only touches wiki/, .claude/, .specify/,
          # prose docs, or .gaia/ metadata are skipped; the agent has no rules
          # that would meaningfully apply. The base is the last clean-audited
          # ancestor, so once a code commit is audited clean a later prose-only
          # commit reviews an empty auditable delta and skips. origin/main (no
          # audited ancestor) → full PR diff, preserving first-audit behavior.
          changed=$(git diff --name-only "${AUDIT_BASE}...HEAD")
          dir_pattern='^(app|test|\.storybook|\.github/workflows)/'
          file_pattern='^(package\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml)$|^tsconfig[^/]*\.json$|^[^/]*\.config\.(ts|mts|mjs|cjs|js)$'
          if printf '%s\n' "$changed" | grep -qE "${dir_pattern}|${file_pattern}"; then
            echo "has_source=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_source=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check workflow self-modification
        id: workflow-self-mod
        if: |
          steps.gate.outputs.gated == 'false' &&
          steps.source-changes.outputs.has_source == 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -eu
          # claude-code-action enforces a workflow-validation guardrail:
          # it refuses to run when the workflow file on the PR branch
          # differs from the version on main (security: prevents secret
          # exfiltration via PR-modified workflows). When this PR
          # touches the workflow itself, the audit cannot run, so skip
          # cleanly and surface a truthful comment instead of letting
          # the abort path post a misleading message.
          changed=$(git diff --name-only "${BASE_SHA}..${HEAD_SHA}")
          if printf '%s\n' "$changed" | grep -qE '^\.github/workflows/code-review-audit\.yml$'; then
            echo "self_modified=true" >> "$GITHUB_OUTPUT"
          else
            echo "self_modified=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve audit decision
        id: decision
        # Per-author mode resolution. Subordinate to the scope gates above:
        # only meaningful once there is in-scope source and the PR is not
        # self-modifying. Delegates to the shared resolver
        # (.gaia/scripts/read-audit-ci-config.sh --resolve-author) so the CI
        # side and the local merge path read the SAME resolved_mode for an
        # author and can never diverge. should_run == 'false' (local mode, no
        # override, in scope) means CI stands down and the local path runs the
        # audit instead.
        if: |
          steps.gate.outputs.gated == 'false' &&
          steps.chore-deps.outputs.skip == 'false' &&
          steps.source-changes.outputs.has_source == 'true' &&
          steps.workflow-self-mod.outputs.self_modified == 'false'
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          OVERRIDE_LABEL: ${{ steps.config.outputs.override_label }}
          PR_LABELS_JSON: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          set -eu
          # Compute override-label presence from the PR's labels, then pass it
          # to the shared resolver via the Phase 1 input form
          # (OVERRIDE_LABEL_PRESENT=true; any-case true/yes/1 → present, absent
          # → not present). The resolver owns precedence + normalization +
          # required-check fail-closed; this step stays thin so it is
          # reviewable by inspection.
          if [ -n "$OVERRIDE_LABEL" ] \
              && printf '%s' "$PR_LABELS_JSON" \
                | jq -e --arg l "$OVERRIDE_LABEL" 'index($l)' >/dev/null; then
            override_present=true
          else
            override_present=false
          fi
          OVERRIDE_LABEL_PRESENT="$override_present" \
            bash .gaia/scripts/read-audit-ci-config.sh \
              --resolve-author "$PR_AUTHOR" >> "$GITHUB_OUTPUT"

      - name: Check audit trailer
        id: trailer
        if: |
          steps.gate.outputs.gated == 'false' &&
          steps.source-changes.outputs.has_source == 'true' &&
          steps.workflow-self-mod.outputs.self_modified == 'false' &&
          steps.decision.outputs.should_run == 'true'
        run: bash .github/audit/check-trailer.sh >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        if: |
          steps.gate.outputs.gated == 'false' &&
          steps.source-changes.outputs.has_source == 'true' &&
          steps.workflow-self-mod.outputs.self_modified == 'false' &&
          steps.decision.outputs.should_run == 'true' &&
          steps.trailer.outputs.skip == 'false'
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - name: Setup Node
        if: |
          steps.gate.outputs.gated == 'false' &&
          steps.source-changes.outputs.has_source == 'true' &&
          steps.workflow-self-mod.outputs.self_modified == 'false' &&
          steps.decision.outputs.should_run == 'true' &&
          steps.trailer.outputs.skip == 'false'
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install dependencies
        if: |
          steps.gate.outputs.gated == 'false' &&
          steps.source-changes.outputs.has_source == 'true' &&
          steps.workflow-self-mod.outputs.self_modified == 'false' &&
          steps.decision.outputs.should_run == 'true' &&
          steps.trailer.outputs.skip == 'false'
        run: pnpm install --frozen-lockfile

      - name: Compute audit step timeout
        id: timeout
        if: |
          steps.gate.outputs.gated == 'false' &&
          steps.source-changes.outputs.has_source == 'true' &&
          steps.workflow-self-mod.outputs.self_modified == 'false' &&
          steps.decision.outputs.should_run == 'true' &&
          steps.trailer.outputs.skip == 'false'
        env:
          BUDGET_SECONDS: ${{ steps.config.outputs.budget_seconds }}
        run: |
          set -eu
          # Convert budget_seconds → minutes (rounded up). Floor of 1 so
          # the action never gets a `timeout-minutes: 0` (treated as "no
          # timeout" by GitHub Actions). Default 30 if the value is
          # missing/zero.
          if [ -z "$BUDGET_SECONDS" ] || [ "$BUDGET_SECONDS" -eq 0 ]; then
            minutes=30
          else
            minutes=$(( (BUDGET_SECONDS + 59) / 60 ))
            [ "$minutes" -lt 1 ] && minutes=1
          fi
          echo "minutes=$minutes" >> "$GITHUB_OUTPUT"

      - name: Run code-review-audit (claude-code-action)
        id: audit
        if: |
          steps.gate.outputs.gated == 'false' &&
          steps.source-changes.outputs.has_source == 'true' &&
          steps.workflow-self-mod.outputs.self_modified == 'false' &&
          steps.decision.outputs.should_run == 'true' &&
          steps.trailer.outputs.skip == 'false'
        # Continue on failure: max-turns / SDK / API errors must not strand
        # the PR check in a half-state. The status-summary terminal steps
        # below comment the outcome regardless.
        continue-on-error: true
        timeout-minutes: ${{ fromJSON(steps.timeout.outputs.minutes) }}
        uses: anthropics/claude-code-action@63322d7b2bc79e7b621b89f41b53ceb8e5a5d314 # v1.0
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run the code-audit-frontend agent at .claude/agents/code-audit-frontend.md.
            Review the INCREMENTAL diff ${{ steps.base.outputs.base }}...HEAD; this
            base is the most recent commit on this PR that already passed a clean
            audit under the current agent version (or origin/main if none), so
            everything before it is already cleared and only the delta needs
            review. For any exported symbol whose signature or contract changed in
            this delta, also check its importers across the repo even if those
            files are unchanged; an incremental scope must still catch a delta
            that breaks an already-cleared caller. When the agent's report has
            no Critical or Important issues, you MUST stamp the GAIA-Audit
            trailer per .claude/hooks/audit-stamp-trailer.sh. The checkout is at
            a detached HEAD (PR head sha), so the stamp helper writes an empty
            `chore: code review audit passed` commit carrying the trailer; do
            not pass `AUDIT_SELF_HEALED=true` (the helper's amend path would
            rewrite a commit the workflow runner does not own). On a clean
            report you MUST also write the local clean marker file
            `.gaia/local/audit/<HEAD-sha>.ok` for the current HEAD (the "Audit
            marker" step in the agent definition). Write it even if the trailer
            stamp declines or makes no commit: when nothing is pushed, the
            workflow promotes this marker to the durable GAIA-Audit commit
            status on HEAD, and a clean audit that leaves no marker strands the
            merge gate. Any self-heal
            file edits go in their own commit (or commits) BEFORE you call the
            stamp helper. After the audit and stamp, post a single PR comment
            summarizing findings (and whether self-heal commits were pushed).

            FINDINGS BLOCK: append a machine-readable findings block to the END
            of that same PR comment, after the human-readable summary. The block
            is a JSON object wrapped INSIDE an HTML comment so it does not render,
            framed by two stable sentinel lines. The cross-machine tally pass
            parses it; the sentinels are the parse anchors, emit them verbatim:

            <!-- gaia-harden:findings:start -->
            <!--
            {"schema":1,"pr_number":PR_NUMBER,"auditor":"ci","findings":[
              {"finding_class":"react-doctor/no-generic-handler-names","severity":"warning","area_tags":["app/components"]},
              {"finding_class":"holistic/missing-auth-check","severity":"error","area_tags":["app/routes"]}
            ]}
            -->
            <!-- gaia-harden:findings:end -->

            Substitute PR_NUMBER with this PR's number. One object per finding you
            assigned a stable `finding_class`, using the per-bucket convention in
            `.claude/agents/code-review-audit.md` (oracle ids verbatim with the
            tool prefix; the controlled holistic/rule vocabulary otherwise). Carry
            only `finding_class`, `severity` (error/warning/suggestion), and
            `area_tags` per finding, never code or file contents. Omit any finding
            with no stable class (it stays in the prose summary). If you classified
            zero findings, still emit the block with `"findings":[]`, an explicit
            empty block is parseable, a missing one is ambiguous.

            DISPOSITION (out-of-scope findings): the agent files out-of-scope
            findings as deduped, severity-labeled `tech-debt` issues per its own
            definition (.claude/agents/code-review-audit.md). Three CI-mode
            invariants are load-bearing because this run is `--verbose` and posts
            to a PUBLIC channel, so they are restated here (the CI prompt is the
            load-bearing copy for the CI run):
            1. BODY VIA FILE: pass every `gh issue` / advisory body via
               `--body-file <path>` or stdin, NEVER a `--body` argv string.
               `--verbose` echoes command lines into the public Actions log, so a
               `--body` argv would leak finding detail. This mirrors the
               agent-definition rule.
            2. SECURITY DIVERT (count-only): a security-class finding on a
               PUBLIC/INTERNAL repo NEVER becomes a public or internal issue. The
               default GITHUB_TOKEN cannot POST a repository security advisory, and
               the privileged-credential mechanism is DEFERRED -- do NOT wire one
               in v1. Instead surface a redacted COUNT-ONLY signal to the public
               PR comment (e.g. "N security-class findings diverted; maintainer
               must review") with no file:line, no finding text, no finding_class.
               The marker still writes -- never a public issue, never a marker
               deadlock. Durable tracking of diverted PUBLIC/INTERNAL security
               findings is deferred.
            3. PUBLIC COMMENT CARRIES COUNTS ONLY: the disposition feature adds
               only COUNTS to the public PR comment -- no out-of-scope finding
               detail, no security detail, no file:line. The FINDINGS BLOCK above
               is unchanged (it carries only finding_class / severity / area_tags).

            SELF-HEAL CONSTRAINTS: read before making any edits:
            1. Run `git diff --name-only origin/main...HEAD` first. Self-heal edits
               are ONLY permitted on files that appear in this list. Never edit a
               file that was not changed by this PR.
            2. Run `git diff origin/main...HEAD -- <file>` before editing any file.
               If the PR's diff for that file shows lines being REMOVED (minus lines),
               do NOT restore them. Intentional deletions are not defects.
            3. Never add content that references a library, tool, or pattern that this
               PR removed. The PR diff is the source of truth for intent.
            4. NEVER edit files under `.claude/`, `.specify/`, or `wiki/` as part of
               a self-heal. These define the project's conventions, skills, and this
               agent's own definition, not code defects. If one looks wrong, raise
               it as a finding for human review. The workflow's self-heal scope gate
               refuses any self-heal that touches them.
          claude_args: |
            --max-turns ${{ steps.config.outputs.max_turns }}
            --allowedTools Edit,Write,Bash(git:*),Bash(pnpm:*),Bash(node:*),Bash(npm:*),Bash(gh:*)
            --verbose

      - name: Print audit progress breadcrumbs
        # Public-safe observability. The agent (show_full_output:false hides its
        # SDK output) writes curated per-phase breadcrumbs to a gitignored file
        # via Write/Edit; this step surfaces them in the step summary AFTER the
        # agent runs. Gate MIRRORS the agent step exactly (not always(), not
        # success()) so partial breadcrumbs surface even on an aborted audit.
        # Always exits 0: a missing/empty file must never fail the required check.
        if: |
          steps.gate.outputs.gated == 'false' &&
          steps.source-changes.outputs.has_source == 'true' &&
          steps.workflow-self-mod.outputs.self_modified == 'false' &&
          steps.decision.outputs.should_run == 'true' &&
          steps.trailer.outputs.skip == 'false'
        run: |
          set +e
          progress=".gaia/local/audit/progress.log"
          {
            echo "## code-review-audit progress"
            echo ""
            if [ -s "$progress" ]; then
              echo '```'
              cat "$progress"
              echo '```'
            else
              echo "_No breadcrumbs recorded (audit wrote none, or aborted before the first phase)._"
            fi
          } >> "$GITHUB_STEP_SUMMARY" 2>/dev/null
          # Mirror to the step log for log-only consumers.
          if [ -s "$progress" ]; then
            echo "code-review-audit progress:"
            cat "$progress"
          fi
          exit 0

      - name: Commit and push self-heal
        id: push-fixes
        if: |
          steps.gate.outputs.gated == 'false' &&
          steps.source-changes.outputs.has_source == 'true' &&
          steps.workflow-self-mod.outputs.self_modified == 'false' &&
          steps.decision.outputs.should_run == 'true' &&
          steps.trailer.outputs.skip == 'false' &&
          steps.config.outputs.push_fixes == 'true' &&
          steps.audit.outcome == 'success'
        run: |
          set -eu
          # Push gate: any combination of (a) commits the agent made
          # (self-heal commits and/or the stamp helper's empty trailer
          # commit) ahead of origin, OR (b) leftover uncommitted edits
          # the agent forgot to commit. Both must reach origin/PR_BRANCH.
          git config user.name 'gaia-code-review-audit[bot]'
          git config user.email 'gaia-code-review-audit[bot]@users.noreply.github.com'

          # Drop claude-code-action's untrusted-PR file restore before the tree
          # is inspected or staged. The action restores a fixed set of sensitive
          # config/hook paths from origin/main into the runner's working tree
          # before the agent runs (it logs "Restoring ... from origin/main (PR
          # head is untrusted)"). When this PR legitimately modifies one of them,
          # that restore REVERTS the PR's change in the working tree; the
          # `git add -u` below would then stage the revert and commit it as a
          # bogus self-heal -- this is what stripped a .husky/pre-commit guard a
          # PR had just added. The agent is never an allowed editor of these
          # convention/hook surfaces, so any working-tree delta on them is either
          # the action's restore or a forbidden edit; reset each to HEAD either
          # way. Keep this list in sync with claude-code-action's restore set.
          for restored_path in \
            .husky .mcp.json .claude.json .gitmodules .ripgreprc \
            CLAUDE.md CLAUDE.local.md; do
            git checkout HEAD -- "$restored_path" 2>/dev/null || true
          done

          # Surface untracked files for transparency. The agent or
          # claude-code-action may leave runtime artifacts (e.g. .claude-pr/)
          # behind; .gitignore should cover known cases. We never stage them.
          untracked="$(git ls-files --others --exclude-standard | wc -l | tr -d ' ')"
          if [ "$untracked" -gt 0 ]; then
            echo "code-review-audit: $untracked untracked file(s) left behind by audit (NOT staged):" >&2
            git ls-files --others --exclude-standard | head -20 >&2
          fi

          # Self-heal scope gate. Instruction / convention surfaces
          # (.claude/**, .specify/**, wiki/**) are the rules this audit
          # enforces and the agent's own definition -- never code defects
          # it should auto-fix. A self-heal that edits them is almost
          # always reverting an intentional convention change. Inspect
          # both committed self-heal commits and uncommitted edits; if any
          # touch those surfaces, refuse the whole self-heal and surface
          # it for human review (mirrors the >10-file gate below). The
          # early `exit 0` runs before the commit/push logic, so nothing
          # the audit changed reaches origin.
          self_heal_paths="$(
            {
              git diff --name-only
              git diff --name-only "origin/${PR_BRANCH}..HEAD" 2>/dev/null || true
            } | sort -u
          )"
          if printf '%s\n' "$self_heal_paths" \
              | grep -qE '^(\.claude|\.specify|wiki)/'; then
            echo "code-review-audit: self-heal touched instruction/convention surfaces -- refusing." >&2
            printf '%s\n' "$self_heal_paths" \
              | grep -E '^(\.claude|\.specify|wiki)/' >&2 || true
            {
              echo "pushed=false"
              echo "marker_only=false"
              echo "refused=true"
              echo "refused_reason=instruction-surface"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git diff --quiet; then
            # Stage modifications and deletions to TRACKED files only -- never
            # `git add -A`, which would sweep audit runtime artifacts.
            git add -u

            # Self-heal sanity gate. A code review audit's auto-fix surface
            # should be small (a typo, a stale import). A sprawling diff is
            # a red flag -- the agent is likely undoing intentional PR work
            # rather than fixing a defect. Refuse and surface for human review.
            files_changed="$(git diff --cached --name-only | wc -l | tr -d ' ')"
            if [ "$files_changed" -gt 10 ]; then
              echo "code-review-audit: self-heal would touch $files_changed files (>10) -- refusing." >&2
              echo "Files staged:" >&2
              git diff --cached --name-only >&2
              git reset >/dev/null
              {
                echo "pushed=false"
                echo "marker_only=false"
                echo "refused=true"
                echo "refused_reason=file-count"
                echo "refused_count=$files_changed"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if ! git diff --cached --quiet; then
              git commit -m "chore: code-review-audit self-heal"
            fi
          fi

          # A commit is the empty marker iff: (a) its tree equals its parent's
          # tree (empty commit), AND (b) its message carries a GAIA-Audit:
          # trailer line.
          is_marker_commit() {
            sha="$1"
            parent="$(git rev-parse "${sha}^" 2>/dev/null || true)"
            [ -n "$parent" ] || return 1
            head_tree="$(git rev-parse "${sha}^{tree}")"
            parent_tree="$(git rev-parse "${parent}^{tree}")"
            [ "$head_tree" = "$parent_tree" ] || return 1
            git log -1 --format='%B' "$sha" | grep -q '^GAIA-Audit:' || return 1
            return 0
          }

          ahead=$(git rev-list --count "origin/${PR_BRANCH}..HEAD" 2>/dev/null || echo 0)
          if [ "$ahead" -eq 0 ]; then
            {
              echo "pushed=false"
              echo "marker_only=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Case A: the ONLY commit ahead of origin is the empty marker.
          # GitHub does not re-trigger CI for GITHUB_TOKEN pushes, so pushing
          # the empty marker would strand the PR on a HEAD with zero checks.
          # Skip the push; the GAIA-Audit status step stamps HEAD~1 instead.
          if [ "$ahead" -eq 1 ] && is_marker_commit HEAD; then
            audit_sha="$(git rev-parse HEAD~1)"
            echo "code-review-audit: marker-only HEAD; not pushing the empty commit." >&2
            {
              echo "pushed=false"
              echo "marker_only=true"
              echo "audit_sha=${audit_sha}"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Case B: real self-heal commits exist. If the marker is sitting on
          # top of them, drop it before pushing so we never push the empty
          # commit. Soft reset keeps the working tree clean (the marker is
          # empty), matching the real self-heal HEAD.
          if is_marker_commit HEAD; then
            git reset --soft HEAD~1
            echo "code-review-audit: dropped empty marker commit before pushing self-heal." >&2
          fi

          # Re-establish authenticated remote URL before push. The agent's
          # Bash(git:*) toolset can mutate git config (remote URL, credential
          # helper, extraheader) during execution; rather than diagnose every
          # path, force a known-good token-bearing URL right before the push.
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:$PR_BRANCH"
          audit_sha="$(git rev-parse HEAD)"
          {
            echo "pushed=true"
            echo "marker_only=false"
            echo "audit_sha=${audit_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Write GAIA-Audit commit status
        if: |
          steps.gate.outputs.gated == 'false' &&
          steps.source-changes.outputs.has_source == 'true' &&
          steps.workflow-self-mod.outputs.self_modified == 'false' &&
          steps.decision.outputs.should_run == 'true' &&
          steps.trailer.outputs.skip == 'false' &&
          steps.audit.outcome == 'success' &&
          (steps.push-fixes.outputs.marker_only == 'true' ||
           steps.push-fixes.outputs.pushed == 'true')
        env:
          AUDIT_SHA: ${{ steps.push-fixes.outputs.audit_sha }}
        run: |
          set -eu
          # Write a GAIA-Audit commit status on the SHA that already carries
          # the audit's check runs. A status (unlike a pushed empty commit)
          # does not advance the branch HEAD, so branch protection stays
          # satisfied and the check-name skip logic still has a durable
          # signal to read on a re-run.
          if [ -z "${AUDIT_SHA:-}" ]; then
            echo "code-review-audit: no audit_sha to stamp; skipping status." >&2
            exit 0
          fi
          version="$(tr -d '\r' < .gaia/VERSION | awk 'NF{print; exit}')"
          version="${version#"${version%%[![:space:]]*}"}"
          version="${version%"${version##*[![:space:]]}"}"
          if [ -z "$version" ]; then
            echo "code-review-audit: .gaia/VERSION missing/empty; skipping status." >&2
            exit 0
          fi
          tree_sha="$(git rev-parse "${AUDIT_SHA}^{tree}")"
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${AUDIT_SHA}" \
            --method POST \
            --field state=success \
            --field context=GAIA-Audit \
            --field description="${version} ${tree_sha}"

      - name: Write GAIA-Audit commit status (clean, no push)
        if: |
          steps.gate.outputs.gated == 'false' &&
          steps.source-changes.outputs.has_source == 'true' &&
          steps.workflow-self-mod.outputs.self_modified == 'false' &&
          steps.decision.outputs.should_run == 'true' &&
          steps.trailer.outputs.skip == 'false' &&
          steps.config.outputs.push_fixes == 'true' &&
          steps.audit.outcome == 'success' &&
          steps.push-fixes.outputs.pushed != 'true' &&
          steps.push-fixes.outputs.marker_only != 'true'
        env:
          # The PUSHED PR head sha, straight from the event payload. This is the
          # only commit GitHub is guaranteed to have; `git rev-parse HEAD` in the
          # runner can point at a local, never-pushed commit the audit created
          # during the run (an empty trailer marker, or a refused self-heal), and
          # POSTing a status to a sha GitHub does not have returns HTTP 422.
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -eu
          # Genuinely-clean-but-no-commit path. A clean audit that makes no
          # self-heal commits AND no empty trailer commit leaves push-fixes
          # with neither `pushed` nor `marker_only` set, so the stamp step
          # above is skipped and the PR head carries no GAIA-Audit status. The
          # merge hook (.claude/hooks/pr-merge-audit-check.sh) then finds no
          # signal and blocks the merge even though the audit passed; the only
          # escape used to be a local agent pushing an empty trailer commit, the
          # very HEAD-moving workaround the design avoids. Close that gap by
          # stamping the GAIA-Audit status DIRECTLY on the pushed PR head.
          #
          # Target the pushed head from the event ($HEAD_SHA), NOT `git rev-parse
          # HEAD`. The runner's HEAD is not always the pushed head by this step:
          # the audit runs with Bash(git:*) and may leave a local commit (an
          # empty marker, or a refused self-heal edit) that was intentionally not
          # pushed, so `git rev-parse HEAD` can resolve to a commit GitHub never
          # received. Stamping that sha 422s ("No commit found for SHA") and,
          # under set -eu, reds an otherwise-clean audit. The pushed head is also
          # the tree that will actually merge (nothing was pushed), so its tree
          # is exactly what we vouch for.
          #
          # This path also covers a REFUSED self-heal: when the audit is clean
          # but its only tree delta is off-limits to auto-fix -- an
          # instruction/convention surface (.claude/**, .specify/**, wiki/**) or
          # a >10-file sprawl -- push-fixes sets refused=true and pushes nothing.
          # `refused` means the self-heal was off-limits, NOT that the audit
          # failed or the tree is dirty, so it must not gate this stamp; the
          # .ok-marker guard below is the sole proven-clean check for every
          # no-push case (clean-no-commit and refused alike).
          #
          # Proven-clean guard (must never false-pass): the audit agent writes
          # the local marker file .gaia/local/audit/<HEAD>.ok ONLY when the
          # review is clean (no Critical, every Important addressed, every
          # Suggestion fixed or none). It is NEVER written while findings
          # remain. In the clean-no-commit case HEAD == the pushed head, so the
          # marker is named for $HEAD_SHA. A dirty audit also reaches this step
          # (it pushed nothing), but its marker is absent, so no status is
          # stamped and the merge stays blocked until a local audit clears it.
          # This is the same artifact the merge hook trusts as its first accepted
          # signal. The marker lives under .gaia/local/ (gitignored), so it
          # exists only in this runner's workspace and only for this run.
          marker=".gaia/local/audit/${HEAD_SHA}.ok"
          if [ ! -f "$marker" ]; then
            echo "code-review-audit: clean marker ${marker} absent; audit not proven clean, not stamping." >&2
            exit 0
          fi
          version="$(tr -d '\r' < .gaia/VERSION | awk 'NF{print; exit}')"
          version="${version#"${version%%[![:space:]]*}"}"
          version="${version%"${version##*[![:space:]]}"}"
          if [ -z "$version" ]; then
            echo "code-review-audit: .gaia/VERSION missing/empty; skipping status." >&2
            exit 0
          fi
          tree_sha="$(git rev-parse "${HEAD_SHA}^{tree}")"
          # Non-fatal POST: a failed status side-effect must never red a clean
          # audit. The gate is the GAIA-Audit status itself -- if this POST
          # fails, the status simply does not land and the local merge path
          # re-stamps it; the check stays green either way. `if !` keeps set -eu
          # from aborting on a non-zero exit.
          if ! gh api "repos/${GITHUB_REPOSITORY}/statuses/${HEAD_SHA}" \
              --method POST \
              --field state=success \
              --field context=GAIA-Audit \
              --field description="${version} ${tree_sha}"; then
            echo "code-review-audit: GAIA-Audit status POST to ${HEAD_SHA} failed (non-fatal); local merge path will re-stamp." >&2
          fi

      - name: Stand down (local-mode, no override)
        if: |
          steps.gate.outputs.gated == 'false' &&
          steps.chore-deps.outputs.skip == 'false' &&
          steps.source-changes.outputs.has_source == 'true' &&
          steps.workflow-self-mod.outputs.self_modified == 'false' &&
          steps.decision.outputs.should_run == 'false'
        run: |
          set -eu
          # Local-mode stand-down: this author's resolved mode is `local` with
          # no override label, and the change is in audit scope. CI does NOT run
          # the audit (no tokens spent); the local merge path runs it instead.
          # Post a `pending` GAIA-Audit status on HEAD so the required check
          # blocks the merge button until the local audit clears it. The
          # description deliberately carries NO `<version> <tree-sha>` cleared
          # shape -- a fixed sentinel that cannot match HEAD's tree -- so even a
          # state-blind reader cannot mistake it for cleared (defense in depth
          # behind the state-aware readers, which reject any non-success state).
          # Subordinate to the scope gates (has_source == true && self_modified
          # == false): out-of-scope / self-mod PRs take the existing
          # success-stamp paths and never reach here, so exactly one terminal
          # status lands per run.
          head_sha="$(git rev-parse HEAD)"
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${head_sha}" \
            --method POST \
            --field state=pending \
            --field context=GAIA-Audit \
            --field description="local-mode stand-down: audit pending"

      - name: Write GAIA-Audit commit status (out-of-scope skip)
        if: |
          steps.gate.outputs.gated == 'false' &&
          steps.chore-deps.outputs.skip == 'false' &&
          steps.source-changes.outputs.has_source == 'false'
        run: |
          set -eu
          # Out-of-scope skip path: the un-audited delta touches no
          # audit-relevant files, so the agent never runs and a local audit
          # would find nothing in scope. Stamp a GAIA-Audit commit status on
          # HEAD anyway so the merge hook (.claude/hooks/pr-merge-audit-check.sh)
          # is satisfied without a ceremonial local run. has_source=='false'
          # structurally excludes the already-audited path (has_source=='true'
          # && trailer.skip) and the self-modification path (has_source=='true'
          # && self_modified), both require has_source=='true', so neither
          # auto-stamps. The description carries HEAD's tree (the merge hook
          # checks tree equality against the content being merged), not a
          # base/audit-sha tree.
          version="$(tr -d '\r' < .gaia/VERSION | awk 'NF{print; exit}')"
          version="${version#"${version%%[![:space:]]*}"}"
          version="${version%"${version##*[![:space:]]}"}"
          if [ -z "$version" ]; then
            echo "code-review-audit: .gaia/VERSION missing/empty; skipping status." >&2
            exit 0
          fi
          head_sha="$(git rev-parse HEAD)"
          tree_sha="$(git rev-parse "HEAD^{tree}")"
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${head_sha}" \
            --method POST \
            --field state=success \
            --field context=GAIA-Audit \
            --field description="${version} ${tree_sha}"

      - name: Re-trigger and stamp required checks on new HEAD
        if: |
          steps.gate.outputs.gated == 'false' &&
          steps.source-changes.outputs.has_source == 'true' &&
          steps.workflow-self-mod.outputs.self_modified == 'false' &&
          steps.trailer.outputs.skip == 'false' &&
          steps.audit.outcome == 'success' &&
          steps.push-fixes.outputs.pushed == 'true'
        env:
          AUDIT_SHA: ${{ steps.push-fixes.outputs.audit_sha }}
          RETRIGGER_WORKFLOWS: ${{ steps.config.outputs.retrigger_workflows }}
        run: |
          set -eu
          # When the audit self-heals and pushes a new commit, GitHub does
          # not fire push / pull_request events for the GITHUB_TOKEN-authored
          # push (recursion guard). The new HEAD would therefore have zero
          # check runs and branch protection would block the merge
          # indefinitely. This step closes that loop in three parts:
          #
          # 1. Stamp a `code-review-audit` check run on the new HEAD with
          #    conclusion=success. The audit just produced the new tree,
          #    so it is vouching for its own output; the GAIA-Audit commit
          #    status stamped above records the version+tree binding.
          # 2. Dispatch every workflow listed in `retrigger_workflows`
          #    against the PR branch. `workflow_dispatch` IS allowed
          #    under GITHUB_TOKEN (unlike push), so the dispatched runs
          #    execute on the self-heal HEAD.
          # 3. Poll each dispatched run to completion, then POST a
          #    matching check run per job to the new HEAD via the Checks
          #    API. The dispatched runs' own check suites are excluded
          #    from `statusCheckRollup` (GitHub filters out
          #    `workflow_dispatch`-event suites whose `pull_requests` link
          #    is empty), so branch protection never sees them. Direct
          #    POST'd check runs land in the rollup regardless of suite
          #    linkage; same mechanism as the `code-review-audit` stamp.
          #
          # Each `gh workflow run` failure (workflow not present, lacks
          # `workflow_dispatch:` trigger, etc.) is logged and tolerated;
          # an adopter may list a workflow that doesn't exist in their
          # repo, and the audit should not fail the PR over that.

          if [ -z "${AUDIT_SHA:-}" ]; then
            echo "code-review-audit: no audit_sha to re-trigger against; skipping." >&2
            exit 0
          fi

          gh api "repos/${GITHUB_REPOSITORY}/check-runs" \
            --method POST \
            --field name=code-review-audit \
            --field head_sha="${AUDIT_SHA}" \
            --field status=completed \
            --field conclusion=success \
            --field 'output[title]=code-review-audit (re-stamped on self-heal HEAD)' \
            --field 'output[summary]=Audit completed on the parent commit and produced the self-heal changes that advanced HEAD to this SHA. The GAIA-Audit commit status on this SHA records the version + tree binding.' \
            >/dev/null \
            || echo "code-review-audit: failed to stamp check run on ${AUDIT_SHA}; continuing." >&2

          if [ -z "${RETRIGGER_WORKFLOWS:-}" ]; then
            echo "code-review-audit: retrigger_workflows is empty; nothing to dispatch." >&2
            exit 0
          fi

          TMPDIR_RT=$(mktemp -d)
          trap 'rm -rf "$TMPDIR_RT"' EXIT

          # Poll a dispatched workflow run to completion, then POST a
          # check run per job into the AUDIT_SHA's rollup. Returns 0
          # always; internal failures are logged and tolerated.
          poll_and_stamp() {
            workflow_name="$1"
            dispatch_ts="$2"

            run_id=""
            for _ in $(seq 1 18); do
              run_id=$(gh api \
                "repos/${GITHUB_REPOSITORY}/actions/runs?event=workflow_dispatch&branch=${PR_BRANCH}&per_page=20" \
                --jq ".workflow_runs[] | select(.name == \"${workflow_name}\" and .created_at >= \"${dispatch_ts}\") | .id" \
                | head -1) || run_id=""
              if [ -n "$run_id" ]; then
                break
              fi
              sleep 5
            done
            if [ -z "$run_id" ]; then
              echo "[${workflow_name}] WARN: dispatched run id not resolved within 90s; not stamping" >&2
              return 0
            fi
            echo "[${workflow_name}] resolved run_id=${run_id}"

            status=""
            conclusion=""
            for _ in $(seq 1 150); do
              payload=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" \
                --jq '{status, conclusion}') || payload='{"status":"unknown","conclusion":null}'
              status=$(printf '%s' "$payload" | jq -r '.status // "unknown"')
              conclusion=$(printf '%s' "$payload" | jq -r '.conclusion // ""')
              if [ "$status" = "completed" ]; then
                break
              fi
              sleep 10
            done
            if [ "$status" != "completed" ]; then
              echo "[${workflow_name}] WARN: run ${run_id} did not complete within 25 min (status=${status}); not stamping" >&2
              return 0
            fi
            echo "[${workflow_name}] run ${run_id} completed: conclusion=${conclusion}"

            jobs_file=$(mktemp)
            gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs" \
              --jq '.jobs[] | {name, conclusion}' > "$jobs_file" \
              || { echo "[${workflow_name}] WARN: failed to enumerate jobs for run ${run_id}" >&2; rm -f "$jobs_file"; return 0; }
            while IFS= read -r job_json; do
              [ -n "$job_json" ] || continue
              job_name=$(printf '%s' "$job_json" | jq -r .name)
              job_conclusion=$(printf '%s' "$job_json" | jq -r '.conclusion // ""')
              if [ -z "$job_conclusion" ] || [ "$job_conclusion" = "null" ]; then
                job_conclusion="failure"
              fi
              echo "[${workflow_name}] stamping '${job_name}' = ${job_conclusion} on ${AUDIT_SHA}"
              gh api "repos/${GITHUB_REPOSITORY}/check-runs" \
                --method POST \
                --field name="${job_name}" \
                --field head_sha="${AUDIT_SHA}" \
                --field status=completed \
                --field conclusion="${job_conclusion}" \
                --field "output[title]=${job_name} (stamped from dispatched run ${run_id})" \
                --field "output[summary]=GitHub excludes workflow_dispatch-event check suites from statusCheckRollup when their pull_requests link is empty (the case for GITHUB_TOKEN-attributed dispatches). This stamp mirrors the dispatched run's per-job conclusion into a directly-attributable check run so branch protection sees the result." \
                >/dev/null \
                || echo "[${workflow_name}] WARN: stamp POST for '${job_name}' failed" >&2
            done < <(jq -c '.' "$jobs_file")
            rm -f "$jobs_file"
          }

          # Phase 1: dispatch every retrigger workflow, fork a background
          # poll_and_stamp per successful dispatch.
          pids=""
          while IFS= read -r workflow_name; do
            [ -n "$workflow_name" ] || continue
            dispatch_ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            echo "code-review-audit: dispatching '${workflow_name}' on ${PR_BRANCH} at ${dispatch_ts}" >&2
            if gh workflow run "$workflow_name" --ref "$PR_BRANCH" 2>&1; then
              log_name=$(printf '%s' "$workflow_name" | tr -c 'A-Za-z0-9._-' '_')
              log="${TMPDIR_RT}/${log_name}.log"
              poll_and_stamp "$workflow_name" "$dispatch_ts" >"$log" 2>&1 &
              pids="$pids $!"
            else
              echo "code-review-audit: dispatch of '${workflow_name}' failed -- workflow may be absent or missing workflow_dispatch trigger." >&2
            fi
          done < <(printf '%s\n' "$RETRIGGER_WORKFLOWS")

          # Phase 2: wait for every background poller, then stream its log.
          for pid in $pids; do
            wait "$pid" || true
          done

          for log in "$TMPDIR_RT"/*.log; do
            [ -f "$log" ] || continue
            echo "----- $(basename "$log") -----"
            cat "$log"
          done

      - name: Prepare status-comment upserter
        # Write the single-comment upsert helper to a run-scoped temp path. Every
        # terminal status step below invokes it so the workflow upserts ONE
        # code-review-audit status comment per PR (located by the stable marker)
        # instead of appending a fresh comment on every push/synchronize.
        # always(): the helper must exist before whichever terminal status step
        # fires, on every code path.
        if: always()
        run: |
          cat > "$RUNNER_TEMP/cra-status-upsert.sh" <<'UPSERT_EOF'
          #!/usr/bin/env bash
          # Upsert the single code-review-audit status comment on a PR.
          # Usage: cra-status-upsert.sh <pr-number> <body>
          set -eu
          MARKER='<!-- gaia:cra-status -->'
          pr="$1"
          body="$2"
          full_body="$(printf '%s\n%s' "$MARKER" "$body")"
          existing_id="$(MARKER="$MARKER" gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/issues/${pr}/comments" \
            --jq '.[] | select(.body | contains(env.MARKER)) | .id' | head -n1)"
          if [ -n "$existing_id" ]; then
            gh api --method PATCH \
              "repos/${GITHUB_REPOSITORY}/issues/comments/${existing_id}" \
              -f body="$full_body" >/dev/null
          else
            gh pr comment "$pr" --body "$full_body"
          fi
          UPSERT_EOF
          chmod +x "$RUNNER_TEMP/cra-status-upsert.sh"

      # ----------------------------------------------------------------
      # Terminal status steps. Exactly one fires per run; together they
      # guarantee the job reaches a clean conclusion on every code path
      # (the job is green-by-design). The required-check gate is the
      # `GAIA-Audit` commit STATUS posted by the stamp / stand-down steps
      # above, not the job name: a `pending` stand-down blocks the merge
      # while the job is still green. These comments are advisory.
      # ----------------------------------------------------------------

      - name: Status - skipped (gate label missing)
        if: steps.gate.outputs.gated == 'true'
        env:
          GATE_LABEL: ${{ steps.config.outputs.gate_label }}
        run: |
          set -eu
          bash "$RUNNER_TEMP/cra-status-upsert.sh" "$PR_NUMBER" \
            "code-review-audit skipped: gate_label '$GATE_LABEL' not present on PR"

      - name: Status - skipped (chore-deps PR)
        if: |
          steps.gate.outputs.gated == 'false' &&
          steps.chore-deps.outputs.skip == 'true'
        run: |
          set -eu
          bash "$RUNNER_TEMP/cra-status-upsert.sh" "$PR_NUMBER" \
            "code-review-audit skipped: chore(deps) / chore(deps-dev) PRs are pre-verified by the /update-deps wrapper's local quality gate"

      - name: Status - skipped (no source changes)
        if: |
          steps.gate.outputs.gated == 'false' &&
          steps.source-changes.outputs.has_source == 'false'
        run: |
          set -eu
          bash "$RUNNER_TEMP/cra-status-upsert.sh" "$PR_NUMBER" \
            "code-review-audit skipped: no audit-relevant files changed in the un-audited delta (since the last clean audit); GAIA-Audit commit status stamped on HEAD so the merge gate is satisfied with no local audit run"

      - name: Status - skipped (trailer matches)
        if: |
          steps.gate.outputs.gated == 'false' &&
          steps.source-changes.outputs.has_source == 'true' &&
          steps.workflow-self-mod.outputs.self_modified == 'false' &&
          steps.trailer.outputs.skip == 'true'
        env:
          MATCHED_VERSION: ${{ steps.trailer.outputs.matched_version }}
          MATCHED_TREE: ${{ steps.trailer.outputs.matched_tree }}
        run: |
          set -eu
          short_tree="$(printf '%s' "$MATCHED_TREE" | cut -c1-7)"
          bash "$RUNNER_TEMP/cra-status-upsert.sh" "$PR_NUMBER" \
            "code-review-audit skipped: GAIA-Audit trailer matches version $MATCHED_VERSION tree $short_tree"

      - name: Status - skipped (workflow self-modification)
        if: |
          steps.gate.outputs.gated == 'false' &&
          steps.source-changes.outputs.has_source == 'true' &&
          steps.workflow-self-mod.outputs.self_modified == 'true'
        run: |
          set -eu
          bash "$RUNNER_TEMP/cra-status-upsert.sh" "$PR_NUMBER" \
            "code-review-audit skipped: PR modifies the audit workflow itself; claude-code-action's workflow-validation guardrail would refuse to run"

      - name: Status - local-mode stand-down
        # Green terminal step for the local-mode stand-down path. The JOB
        # stays green-by-design; the GATE is the `GAIA-Audit` STATUS, which
        # the stand-down step posted as `pending` (blocking the required
        # check). Gated identically to the stand-down step so exactly one
        # terminal status step fires per run.
        if: |
          steps.gate.outputs.gated == 'false' &&
          steps.chore-deps.outputs.skip == 'false' &&
          steps.source-changes.outputs.has_source == 'true' &&
          steps.workflow-self-mod.outputs.self_modified == 'false' &&
          steps.decision.outputs.should_run == 'false'
        env:
          OVERRIDE_LABEL: ${{ steps.config.outputs.override_label }}
        run: |
          set -eu
          bash "$RUNNER_TEMP/cra-status-upsert.sh" "$PR_NUMBER" \
            "code-review-audit standing down for this author (local mode). Merge via Claude (which runs the audit locally) or add the '${OVERRIDE_LABEL}' label to force a CI audit."

      - name: Status - audit aborted
        # `continue-on-error: true` on the audit step keeps the workflow
        # alive after the audit fails so this terminal step can post the
        # truthful comment. `outcome != 'success'` is the only reliable
        # signal that the audit did not run cleanly (the audit step's
        # `conclusion` is forced to success by `continue-on-error`).
        # Common causes: max-turns hit, SDK error, transient API
        # failure, or a workflow-validation refusal that slipped past
        # the self-modification skip. After commenting, `exit 1`
        # surfaces the abort as a red check on the PR; without it, the
        # green-check-plus-aborted-comment combo silently hides real
        # audit failures from PR authors.
        if: |
          steps.gate.outputs.gated == 'false' &&
          steps.source-changes.outputs.has_source == 'true' &&
          steps.workflow-self-mod.outputs.self_modified == 'false' &&
          steps.decision.outputs.should_run == 'true' &&
          steps.trailer.outputs.skip == 'false' &&
          steps.audit.outcome != 'success'
        run: |
          set -eu
          bash "$RUNNER_TEMP/cra-status-upsert.sh" "$PR_NUMBER" \
            "code-review-audit aborted: workflow validation refusal, max-turns, SDK error, or transient API failure (see workflow run logs)"
          exit 1

      - name: Status - audit complete
        if: |
          steps.gate.outputs.gated == 'false' &&
          steps.source-changes.outputs.has_source == 'true' &&
          steps.workflow-self-mod.outputs.self_modified == 'false' &&
          steps.decision.outputs.should_run == 'true' &&
          steps.trailer.outputs.skip == 'false' &&
          steps.audit.outcome == 'success'
        env:
          PUSHED: ${{ steps.push-fixes.outputs.pushed }}
          REFUSED: ${{ steps.push-fixes.outputs.refused }}
          REFUSED_COUNT: ${{ steps.push-fixes.outputs.refused_count }}
          REFUSED_REASON: ${{ steps.push-fixes.outputs.refused_reason }}
          PUSH_FIXES: ${{ steps.config.outputs.push_fixes }}
        run: |
          set -eu
          if [ "$PUSH_FIXES" = "false" ]; then
            mode="advisory (push_fixes=false)"
          elif [ "$REFUSED" = "true" ]; then
            if [ "$REFUSED_REASON" = "instruction-surface" ]; then
              mode="self-heal REFUSED: edited instruction/convention surfaces (.claude/**, .specify/**, or wiki/**), which are off-limits to self-heal; see workflow logs and review manually"
            else
              mode="self-heal REFUSED: diff exceeded the 10-file safety threshold (touched $REFUSED_COUNT files); see workflow logs and review manually"
            fi
          elif [ "$PUSHED" = "true" ]; then
            mode="self-heal pushed"
          else
            mode="no fixes needed"
          fi
          bash "$RUNNER_TEMP/cra-status-upsert.sh" "$PR_NUMBER" \
            "code-review-audit complete: $mode"
