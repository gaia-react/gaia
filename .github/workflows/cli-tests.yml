name: CLI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli-tests:
    name: Vitest (.gaia/cli)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      # Maintainer-only surface. PRs that don't touch the CLI source report
      # this required check green without installing or running anything.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '.gaia/cli/**'
              - '.github/workflows/cli-tests.yml'
              # The audit-template dogfood drift-guard compares this in-tree
              # workflow against the bundled .tmpl. Editing the .tmpl already
              # lands under .gaia/cli/**; the live workflow is the other side
              # of that equality, so a workflow-only edit must re-run the guard
              # or template drift lands silently.
              - '.github/workflows/code-review-audit.yml'
      - if: steps.filter.outputs.code == 'true'
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
      - if: steps.filter.outputs.code == 'true'
        name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
          cache-dependency-path: '.gaia/cli/pnpm-lock.yaml'
      - if: steps.filter.outputs.code == 'true'
        name: Install CLI dependencies
        run: pnpm -C .gaia/cli install --frozen-lockfile
      - if: steps.filter.outputs.code == 'true'
        name: Typecheck
        run: pnpm -C .gaia/cli typecheck
      - if: steps.filter.outputs.code == 'true'
        name: Lint
        run: pnpm -C .gaia/cli lint
      - if: steps.filter.outputs.code == 'true'
        name: Run Vitest tests
        run: pnpm -C .gaia/cli test --run
      # PR-time mirror of release.yml's "Verify committed CLI binaries are
      # rebuilt from src" gate. The committed .gaia/cli/gaia{,-maintainer}
      # bundles are what the runtime and the release tarball actually execute,
      # so a PR that edits .gaia/cli/src/** without rebuilding them would merge
      # a stale binary that only the release cut later catches. Rebuilding is
      # deterministic (esbuild), so a fresh bundle that differs from the
      # committed one means the commit is stale; bundle is idempotent and fast.
      - if: steps.filter.outputs.code == 'true'
        name: Verify committed CLI binaries are rebuilt from src
        run: |
          cp .gaia/cli/gaia /tmp/gaia-committed
          cp .gaia/cli/gaia-maintainer /tmp/gaia-maintainer-committed
          pnpm -C .gaia/cli bundle
          if ! cmp -s /tmp/gaia-committed .gaia/cli/gaia; then
            echo "::error::.gaia/cli/gaia is stale: rebuilding from src (pnpm -C .gaia/cli bundle) produces a different binary. Run the bundle and commit the result." >&2
            exit 1
          fi
          if ! cmp -s /tmp/gaia-maintainer-committed .gaia/cli/gaia-maintainer; then
            echo "::error::.gaia/cli/gaia-maintainer is stale: rebuilding from src (pnpm -C .gaia/cli bundle) produces a different binary. Run the bundle and commit the result." >&2
            exit 1
          fi
