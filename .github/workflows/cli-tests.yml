name: CLI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli-tests:
    name: Vitest (.gaia/cli)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      # Maintainer-only surface. PRs that don't touch the CLI source report
      # this required check green without installing or running anything.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '.gaia/cli/**'
              - '.github/workflows/cli-tests.yml'
              # The audit-template dogfood drift-guard compares this in-tree
              # workflow against the bundled .tmpl. Editing the .tmpl already
              # lands under .gaia/cli/**; the live workflow is the other side
              # of that equality, so a workflow-only edit must re-run the guard
              # or template drift lands silently.
              - '.github/workflows/code-review-audit.yml'
      - if: steps.filter.outputs.code == 'true'
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
      - if: steps.filter.outputs.code == 'true'
        name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
          cache-dependency-path: '.gaia/cli/pnpm-lock.yaml'
      - if: steps.filter.outputs.code == 'true'
        name: Install CLI dependencies
        run: pnpm -C .gaia/cli install --frozen-lockfile
      - if: steps.filter.outputs.code == 'true'
        name: Typecheck
        run: pnpm -C .gaia/cli typecheck
      # Deterministic z.enum ban, mirroring the app-side no-zod-enum lint rule.
      # The CLI has no ESLint config (its source carries eslint-disable
      # directives for a fuller ruleset it does not run, so a single-rule config
      # is not viable), so the ban is a grep guard instead. Use z.literal([...])
      # for string unions.
      - if: steps.filter.outputs.code == 'true'
        name: Guard against z.enum (use z.literal)
        run: |
          if grep -rnE 'z\.enum\(' .gaia/cli/src; then
            echo "::error::z.enum() is banned in .gaia/cli/src. Use z.literal([...]) for string unions (sort values alphanumerically)." >&2
            exit 1
          fi
      - if: steps.filter.outputs.code == 'true'
        name: Run Vitest tests
        run: pnpm -C .gaia/cli test --run
