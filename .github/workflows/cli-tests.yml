name: CLI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli-tests:
    name: Vitest (.gaia/cli)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      # Maintainer-only surface. PRs that don't touch the CLI source report
      # this required check green without installing or running anything.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '.gaia/cli/**'
              - '.github/workflows/cli-tests.yml'
              # The audit-template dogfood drift-guard compares this in-tree
              # workflow against the bundled .tmpl. Editing the .tmpl already
              # lands under .gaia/cli/**; the live workflow is the other side
              # of that equality, so a workflow-only edit must re-run the guard
              # or template drift lands silently.
              - '.github/workflows/code-review-audit.yml'
      - if: steps.filter.outputs.code == 'true'
        # Pinned to v4.4.0 (not v6.0.5 like the other workflows), bumping
        # to v6 surfaces an ERR_PNPM_IGNORED_BUILDS regression on the
        # `pnpm -C .gaia/cli install --frozen-lockfile` invocation: pnpm 10
        # blocks the esbuild postinstall scripts even though
        # `.gaia/cli/package.json`'s `pnpm.onlyBuiltDependencies` lists
        # esbuild. Other workflows install at the project root where the
        # same allowlist works fine. Eats the Node.js 20 deprecation
        # alone (auto-forced to Node 24 starting 2026-06-02 by GitHub).
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - if: steps.filter.outputs.code == 'true'
        name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
          cache-dependency-path: '.gaia/cli/pnpm-lock.yaml'
      - if: steps.filter.outputs.code == 'true'
        name: Install CLI dependencies
        run: pnpm -C .gaia/cli install --frozen-lockfile
      - if: steps.filter.outputs.code == 'true'
        name: Typecheck
        run: pnpm -C .gaia/cli typecheck
      - if: steps.filter.outputs.code == 'true'
        name: Run Vitest tests
        run: pnpm -C .gaia/cli test --run
