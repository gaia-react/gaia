name: CLI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default-deny, so a job added later inherits no scope rather than the
# repository default. Each job below grants exactly what it needs.
permissions: {}

jobs:
  cli-tests:
    name: Vitest (.gaia/cli)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # This job is a declared-required context, so a wedged install or a hung
    # Vitest run would hold every PR at "Expected" for the 6-hour runner
    # default. Fail fast instead; the real runtime is well under a minute.
    timeout-minutes: 15
    # Checkout needs it to clone, and paths-filter and setup-node both default
    # their `token` input to `github.token` for the compare API and the
    # node-versions download. No step here passes a token to anything else.
    #
    # `pull-requests: read` is load-bearing for paths-filter, which resolves a
    # PR's changed files through the API (the same reasoning spelled out in
    # verify-required-checks.yml). Omitting it works only while this repo is
    # public; the day it went private every run would 403 with "Resource not
    # accessible by integration", and since this is a required context that
    # would block every merge rather than redden one advisory check.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      # Maintainer-only surface. PRs that don't touch the CLI source report
      # this required check green without installing or running anything.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '.gaia/cli/**'
              - '.github/workflows/cli-tests.yml'
              # The audit-template dogfood drift-guard compares this in-tree
              # workflow against the bundled .tmpl. Editing the .tmpl already
              # lands under .gaia/cli/**; the live workflow is the other side
              # of that equality, so a workflow-only edit must re-run the guard
              # or template drift lands silently.
              - '.github/workflows/code-review-audit.yml'
              # The region-marker conformance suite binds the TypeScript parser
              # to the two bash readers it inherits its semantics from. It runs
              # in this job (see the step below), so an edit to either bash side
              # must re-run it here or the binding goes unasserted.
              - '.gaia/scripts/tests/region-marker-conformance.bats'
              - '.gaia/scripts/write-audit-remits.sh'
              - '.gaia/scripts/verify-audit-roster.sh'
      - if: steps.filter.outputs.code == 'true'
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
      - if: steps.filter.outputs.code == 'true'
        name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
          cache-dependency-path: '.gaia/cli/pnpm-lock.yaml'
      - if: steps.filter.outputs.code == 'true'
        name: Install CLI dependencies
        run: pnpm -C .gaia/cli install --frozen-lockfile
      - if: steps.filter.outputs.code == 'true'
        name: Typecheck
        run: pnpm -C .gaia/cli typecheck
      - if: steps.filter.outputs.code == 'true'
        name: Lint
        run: pnpm -C .gaia/cli lint
      - if: steps.filter.outputs.code == 'true'
        name: Run Vitest tests
        run: pnpm -C .gaia/cli test --run
      # The region-marker conformance suite drives the real TypeScript parser
      # through tsx, so it needs .gaia/cli/node_modules and skips itself wherever
      # they are absent. audit-ci-tests.yml runs the .gaia/scripts/tests suites on
      # a lean box with no Node and no pnpm, so that guard is always true there
      # and the suite reports skipped-and-green on every run. This job is the one
      # place the dependency exists, which makes it the only place the binding
      # between the parser and the two bash readers is actually asserted.
      - if: steps.filter.outputs.code == 'true'
        name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - if: steps.filter.outputs.code == 'true'
        name: Run region-marker conformance suite
        run: bats .gaia/scripts/tests/region-marker-conformance.bats
      # PR-time mirror of release.yml's "Verify committed CLI binaries and
      # templates are rebuilt from src" gate. The committed
      # .gaia/cli/gaia{,-maintainer} bundles are what the runtime and the
      # release tarball actually execute, so a PR that edits .gaia/cli/src/**
      # without rebuilding them would merge a stale binary that only the
      # release cut later catches. Rebuilding is deterministic (esbuild), so a
      # fresh bundle that differs from the committed one means the commit is
      # stale; bundle is idempotent and fast.
      #
      # Keep this step in lockstep with release.yml's copy. A gap here is not
      # caught anywhere else in the PR lane, and this job is a required check,
      # so what it misses merges.
      - if: steps.filter.outputs.code == 'true'
        name: Verify committed CLI binaries and templates are rebuilt from src
        run: |
          cp .gaia/cli/gaia /tmp/gaia-committed
          cp .gaia/cli/gaia-maintainer /tmp/gaia-maintainer-committed
          # bundle:adopter regenerates .gaia/cli/templates/ from src as a side
          # effect (rm -rf templates && cp -r src/scaffold/templates ...),
          # decoupled from the bundled binary bytes. Snapshot the committed copy
          # before the bundle overwrites it so the diff below can see drift.
          rm -rf /tmp/templates-committed
          cp -r .gaia/cli/templates /tmp/templates-committed
          pnpm -C .gaia/cli bundle
          if ! cmp -s /tmp/gaia-committed .gaia/cli/gaia; then
            echo "::error::.gaia/cli/gaia is stale: rebuilding from src (pnpm -C .gaia/cli bundle) produces a different binary. Run the bundle and commit the result." >&2
            exit 1
          fi
          if ! cmp -s /tmp/gaia-maintainer-committed .gaia/cli/gaia-maintainer; then
            echo "::error::.gaia/cli/gaia-maintainer is stale: rebuilding from src (pnpm -C .gaia/cli bundle) produces a different binary. Run the bundle and commit the result." >&2
            exit 1
          fi
          # Template content resolves at runtime via import.meta.url and never
          # enters the bundled binary, so the byte-cmp above cannot catch a
          # stale committed template. The dogfood drift-guard in the Vitest step
          # covers only templates/workflows/; component/, hook/, route/, and
          # service/ have no other guard in this lane. Diff the regenerated tree
          # against the snapshot taken before the bundle.
          if ! diff -rq /tmp/templates-committed .gaia/cli/templates; then
            echo "::error::.gaia/cli/templates is stale: regenerating from src (pnpm -C .gaia/cli bundle) produces different template files. Run the bundle and commit the result." >&2
            exit 1
          fi

  # PR-gated distribution harness. Before this job, the harness (run-all.sh,
  # its scenarios, lib/) ran only at tag-push (release.yml) and manual
  # workflow_dispatch (distribution.yml), so a change to the CLI bundle, the
  # release-exclude set, or the scrub config that breaks the adopter tarball (a
  # leak, a marker-strip regression, manifest drift) shipped through PR review
  # and was caught only at release, when the fix is far more expensive.
  #
  # This runs Layers 0+1 plus the adopter-flow regressions (07+) and the
  # deterministic marker-strip survival check. It passes NO
  # CLAUDE_CODE_OAUTH_TOKEN, so the Docker/secret-dependent scenarios (06, and
  # 15's advisory model probe) soft-pass-skip via their own guards; the full
  # Layers 0+1+2 run stays with release.yml and distribution.yml, which have the
  # org secret. Not a declared-required context (see verify-required-checks.sh),
  # unlike the sibling cli-tests job. It shares that job's always-runs shape --
  # reporting green when the filter does not match -- so it is
  # branch-protection-safe without ever forcing a merge block from a
  # maintainer-only surface adopters cannot see.
  distribution-harness:
    name: Distribution harness (no-Docker)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Same three consumers as cli-tests above; the scenarios run without a
    # token by design (see the step name at the harness invocation below).
    # `pull-requests: read` is paths-filter's, for the same reason given there.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      # PRs that touch neither the bundle inputs nor the harness report this
      # check green without installing or running anything.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '.gaia/cli/**'
              - '.gaia/release-exclude'
              - '.gaia/release-scrub.yml'
              # The harness itself: a scenario, lib, or runner edit must re-run.
              - '.gaia/tests/distribution/**'
              - '.github/workflows/cli-tests.yml'
      - if: steps.filter.outputs.code == 'true'
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
      - if: steps.filter.outputs.code == 'true'
        name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
          # Scenarios 04/05 run `pnpm install` against the extracted staging
          # tree, which resolves the root lockfile; warm the pnpm store on it.
          cache-dependency-path: 'pnpm-lock.yaml'
      # The harness shells out to the COMMITTED bundled binaries directly
      # (build-staging.sh needs gaia-maintainer; the scenarios need gaia); it
      # does not `pnpm -C .gaia/cli install`. Freshness of those binaries vs.
      # src is the sibling cli-tests job's concern; here we test the committed
      # bundle as-is, which is what the release tarball ships.
      - if: steps.filter.outputs.code == 'true'
        name: Verify committed CLI binaries are present
        run: |
          for bin in .gaia/cli/gaia .gaia/cli/gaia-maintainer; do
            if [ ! -x "$bin" ]; then
              echo "::error::$bin missing or not executable. Maintainer must commit the bundled binary." >&2
              exit 1
            fi
          done
      - if: steps.filter.outputs.code == 'true'
        name: Run distribution scenarios (Layers 0+1 + adopter-flow; no token)
        # Intentionally no CLAUDE_CODE_OAUTH_TOKEN: keeps the Docker/secret
        # scenarios out of the required PR lane (they self-skip as soft PASS).
        run: bash .gaia/tests/distribution/run-all.sh
