name: Audit CI Tests

# Runs the bats suites for the .github/audit/ helpers that
# code-review-audit.yml consumes, check-trailer.sh (skip-logic gate) and
# resolve-audit-base.sh (incremental review base), plus the
# pr-merge-audit-check.sh PreToolUse merge hook (GAIA-Audit status reader).
# Maintainer-only:
# adopters receive these as GAIA-controlled (`owned`) code they never
# modify, so the suite only catches regressions from maintainer edits.
# Mirrors cli-tests.yml's narrow-surface, paths-filtered, step-gated shape.
#
# Pinned action SHAs match .github/workflows/cli-tests.yml:
#   actions/checkout    @ 93cb6efe18208431cddfb8368fd83d5badbf9bfd (v5.0.1)
#   dorny/paths-filter  @ fbd0ab8f3e69293af611ebaee6363fc25e6d187d (v4.0.1)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The job checks out, resolves changed files via dorny/paths-filter, and runs
# bats; it needs no write scopes, so pin GITHUB_TOKEN to least privilege instead
# of inheriting the repo-default scope. `pull-requests: read` is load-bearing,
# not decoration: naming any scope here sets every unlisted one to `none`, and
# dorny/paths-filter resolves a PR's changed files through the API, which needs
# it. Omitting it works only while this repo is public; the day it went private,
# every run would 403 with "Resource not accessible by integration". Mirrors
# shell-lint.yml, which runs the same action on the same trigger.
permissions:
  contents: read
  pull-requests: read

jobs:
  audit-ci-tests:
    name: Audit CI Tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      # PRs that don't touch the audit scripts report this check green
      # without installing or running anything.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '.github/audit/**'
              - '.github/workflows/audit-ci-tests.yml'
              # ci-status-member-gate.bats EXECUTES `run:` bodies extracted from
              # code-review-audit.yml, so that workflow is a source this suite
              # guards, not just a consumer of it. Its structural lock pins the
              # set of steps that POST a `pending` GAIA-Audit status and fails on
              # an unguarded new one -- but the edit that adds such a step touches
              # only the workflow, which matches none of the other paths here, so
              # without this line the filter would report `code=false`, skip every
              # bats step, and green the job having run zero tests. Same test-dir/
              # source-dir pairing as the three instruction files below.
              - '.github/workflows/code-review-audit.yml'
              # '.claude/hooks/**' is the superset of the specific hooks this
              # suite used to filter on (repo-scope.sh, pr-merge-audit-check.sh,
              # post-audit-status.sh); it now also covers every hook exercised
              # by the .gaia/tests/hooks/ suites below.
              - '.claude/hooks/**'
              - '.gaia/scripts/**'
              # The audit-guard-structural suite (.gaia/scripts/tests/) greps the
              # prose of these three instruction files for the no-op-guard wiring
              # (SPEC-025 plan DP-005). An instruction-only edit touches none of
              # the source dirs above, so without these three paths the suite
              # would not re-trigger on drift of the surfaces it guards.
              - '.claude/skills/gaia/references/spec.md'
              - '.claude/skills/gaia/references/plan.md'
              - '.claude/agents/code-audit-frontend.md'
              # The doc-isolation suite (.gaia/tests/lib/) renders the prompt out
              # of the shared isolation reference and greps both callers' pointer
              # wiring, so the fragment and debt.md are sources it guards too.
              # plan.md is already listed above.
              - '.claude/skills/gaia/references/isolation.md'
              - '.claude/skills/gaia/references/debt.md'
              # The doc-setup-gaia-isolation and doc-gaia-init-isolation suites
              # (.gaia/tests/lib/) grep the /setup-gaia Phase 3.5 clause and the
              # /gaia-init Step 9 question block; trigger on the two command
              # files that carry that prose so an edit to either re-runs its
              # suite.
              - '.claude/commands/setup-gaia.md'
              - '.claude/commands/gaia-init.md'
              - '.gaia/tests/forensics/**'
              - '.gaia/tests/hooks/**'
              - '.gaia/tests/lib/**'
              # The .gaia/tests/lib/ suites exercise the SPEC-ledger lib scripts
              # under .specify/extensions/gaia/lib/ (spec-archive-merged.sh and
              # its shared cost-consolidate.sh, the allocators, ledger-update,
              # etc.), so trigger on that source dir too. A source-only edit then
              # runs the suite, matching the test-dir + source-dir pairing the
              # filters above already use (.gaia/tests/hooks/** + .claude/hooks/**;
              # .gaia/tests/forensics/** + .github/forensics/**).
              - '.specify/extensions/gaia/lib/**'
              # registry.bats (.gaia/tests/lib/) asserts every commands/*.md
              # file is registered in extension.yml's provides.commands and
              # every registered file: resolves on disk; trigger on both
              # guarded surfaces so an unregistered command file (the #651
              # drift the suite exists to catch) re-runs the suite.
              - '.specify/extensions/gaia/commands/**'
              - '.specify/extensions/gaia/extension.yml'
              - '.claude/skills/gaia/references/forensics*'
              - '.github/forensics/**'
              # The statusline suite (.gaia/tests/statusline/) exercises the
              # shipped .gaia/statusline/gaia-statusline.sh worktree detection;
              # trigger on both the test dir and the script it guards.
              - '.gaia/statusline/**'
              - '.gaia/tests/statusline/**'
      # python3-yaml pins the parser lint-yaml.bats' require_yaml_parser needs
      # (python3+pyyaml), so its parser-backed negative tests run explicitly
      # rather than resting on whatever the runner image happens to preinstall.
      - if: steps.filter.outputs.code == 'true'
        name: Install bats and YAML parser
        run: sudo apt-get update && sudo apt-get install -y bats python3-yaml
      - if: steps.filter.outputs.code == 'true'
        name: Run .github/audit bats suites
        run: bats .github/audit/tests/
      - if: steps.filter.outputs.code == 'true'
        name: Run .gaia/scripts bats suites
        run: bats .gaia/scripts/tests/
      - if: steps.filter.outputs.code == 'true'
        name: Run .gaia/tests/forensics bats suites
        run: bash .gaia/tests/forensics/run-all.sh
      # The hook suites are authored/run locally on macOS bash 3.2.57, where a
      # false mid-test `[[ ... ]]` does NOT fail the test (bash 3.2 skips it
      # under set -e), so a broken assertion can green locally. Ubuntu bats runs
      # under bash 5, which enforces `[[ ]]`, making this the authoritative gate
      # for token-tally-git-op.bats, token-rollup-merge.bats, and siblings. The
      # four node-dependent RED-verify suites self-skip here (no node_modules on
      # this lean box); see their setup() guards.
      - if: steps.filter.outputs.code == 'true'
        name: Run .gaia/tests/hooks bats suites
        run: bats .gaia/tests/hooks/
      # The SPEC-ledger lib suites (.specify/extensions/gaia/lib/ scripts):
      # spec-archive-merged.sh + the shared cost-consolidate.sh routine, the
      # spec/plan allocators, folderize, renumber, reconcile, ledger-update,
      # with-ledger-lock. Same bash-5 rationale as the hooks step above. On this
      # lean box flock is present (the mkdir-fallback test's flock branch runs
      # instead of self-skipping) and the real project ledger is absent
      # (.gaia/local/ is gitignored), so spec-ledger-status's project-ledger
      # test self-skips; both are green outcomes.
      - if: steps.filter.outputs.code == 'true'
        name: Run .gaia/tests/lib bats suites
        run: bats .gaia/tests/lib/
      - if: steps.filter.outputs.code == 'true'
        name: Run .gaia/tests/statusline bats suites
        run: bats .gaia/tests/statusline/
