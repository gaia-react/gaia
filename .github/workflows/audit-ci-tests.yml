name: Audit CI Tests

# Runs the bats suites for the .github/audit/ helpers that
# code-review-audit.yml consumes, check-trailer.sh (skip-logic gate) and
# resolve-audit-base.sh (incremental review base), plus the
# pr-merge-audit-check.sh PreToolUse merge hook (GAIA-Audit status reader).
# Maintainer-only:
# adopters receive these as GAIA-controlled (`owned`) code they never
# modify, so the suite only catches regressions from maintainer edits.
# Mirrors cli-tests.yml's narrow-surface, paths-filtered, step-gated shape.
#
# Pinned action SHAs match .github/workflows/cli-tests.yml:
#   actions/checkout    @ 93cb6efe18208431cddfb8368fd83d5badbf9bfd (v5.0.1)
#   dorny/paths-filter  @ fbd0ab8f3e69293af611ebaee6363fc25e6d187d (v4.0.1)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-ci-tests:
    name: bats (.github/audit)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      # PRs that don't touch the audit scripts report this check green
      # without installing or running anything.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '.github/audit/**'
              - '.github/workflows/audit-ci-tests.yml'
              # '.claude/hooks/**' is the superset of the specific hooks this
              # suite used to filter on (repo-scope.sh, pr-merge-audit-check.sh,
              # post-audit-status.sh); it now also covers every hook exercised
              # by the .gaia/tests/hooks/ suites below.
              - '.claude/hooks/**'
              - '.gaia/scripts/**'
              - '.gaia/tests/forensics/**'
              - '.gaia/tests/hooks/**'
              - '.gaia/tests/lib/**'
              # The .gaia/tests/lib/ suites exercise the SPEC-ledger lib scripts
              # under .specify/extensions/gaia/lib/ (spec-archive-merged.sh and
              # its shared cost-consolidate.sh, the allocators, ledger-update,
              # etc.), so trigger on that source dir too. A source-only edit then
              # runs the suite, matching the test-dir + source-dir pairing the
              # filters above already use (.gaia/tests/hooks/** + .claude/hooks/**;
              # .gaia/tests/forensics/** + .github/forensics/**).
              - '.specify/extensions/gaia/lib/**'
              - '.claude/skills/gaia/references/forensics*'
              - '.github/forensics/**'
      - if: steps.filter.outputs.code == 'true'
        name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - if: steps.filter.outputs.code == 'true'
        name: Run .github/audit bats suites
        run: bats .github/audit/tests/
      - if: steps.filter.outputs.code == 'true'
        name: Run .gaia/scripts bats suites
        run: bats .gaia/scripts/tests/
      - if: steps.filter.outputs.code == 'true'
        name: Run .gaia/tests/forensics bats suites
        run: bash .gaia/tests/forensics/run-all.sh
      # The hook suites are authored/run locally on macOS bash 3.2.57, where a
      # false mid-test `[[ ... ]]` does NOT fail the test (bash 3.2 skips it
      # under set -e), so a broken assertion can green locally. Ubuntu bats runs
      # under bash 5, which enforces `[[ ]]`, making this the authoritative gate
      # for token-tally-git-op.bats, token-rollup-merge.bats, and siblings. The
      # four node-dependent RED-verify suites self-skip here (no node_modules on
      # this lean box); see their setup() guards.
      - if: steps.filter.outputs.code == 'true'
        name: Run .gaia/tests/hooks bats suites
        run: bats .gaia/tests/hooks/
      # The SPEC-ledger lib suites (.specify/extensions/gaia/lib/ scripts):
      # spec-archive-merged.sh + the shared cost-consolidate.sh routine, the
      # spec/plan allocators, folderize, renumber, reconcile, ledger-update,
      # with-ledger-lock. Same bash-5 rationale as the hooks step above. On this
      # lean box flock is present (the mkdir-fallback test's flock branch runs
      # instead of self-skipping) and the real project ledger is absent
      # (.gaia/local/ is gitignored), so spec-ledger-status's project-ledger
      # test self-skips; both are green outcomes.
      - if: steps.filter.outputs.code == 'true'
        name: Run .gaia/tests/lib bats suites
        run: bats .gaia/tests/lib/
