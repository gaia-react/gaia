# .gaia/audit-ci.yml: adopter-tunable knobs for the code-review-audit CI workflow.
# This file ships in the GAIA template; adopters edit values to tune behavior.
# The workflow reads this file at job start; missing file falls back to the defaults below.

# Run the audit only when the PR carries this label. Set to null to run on every PR.
# Maintainer recommendation: leave null until the audit is stable in CI; flip to "ready-for-review" once it is.
gate_label: null

# Hard wall-clock budget (seconds) for the audit invocation. Workflow times out
# the agent step at this value and reports a clean "audit aborted: budget" check
# rather than failing red.
budget_seconds: 1800

# Maximum number of fix turns the agent is allowed inside CI. Maps to claude_args
# `--max-turns`. Lower = cheaper. Higher = more chance to self-heal.
max_turns: 60

# Whether the agent may push self-heal commits to the PR branch. Set false to make
# the audit advisory-only (it comments findings but does not push).
push_fixes: true

# Who audits: `local` (a session on the developer's machine) or `ci` (the
# code-review-audit workflow). Both producers resolve this identically from this
# file, the per-author map, the override label, and whether the PR comes from a
# fork, so they never disagree about who audits. A fork PR always resolves to
# `ci` regardless of this value.
default_mode: local

# Workflows the audit re-dispatches against the PR branch after a self-heal
# push. GitHub does not fire push / pull_request events for commits made with
# GITHUB_TOKEN (its recursion guard), so required check runs on the new HEAD
# would otherwise be absent and branch protection would block the merge. The
# audit calls `gh workflow run --ref <branch>` for each name, producing fresh
# check runs on the new HEAD.
#
# Each entry is the workflow's `name:` field (top of its YAML file), not the
# filename. The two entries below match the GAIA template's required-check-
# producing workflows. Adopters who require additional workflows (e.g. a
# custom lint or security scan) add them here; adopters who do not require
# Chromatic / Tests can remove them.
#
# Workflows listed here must declare `workflow_dispatch:` in their `on:`
# triggers. The GAIA template's `chromatic.yml` and `tests.yml` already do.
retrigger_workflows:
  - Chromatic
  - Tests

# Code Audit Team roster. Each entry maps file-globs to a specialized auditor
# member; the dispatch resolver (.gaia/scripts/resolve-audit-members.sh) reads
# this list, and the shared GAIA-Audit gate requires a per-member clearance for
# every member a diff dispatches. Every member, the default included, declares
# its own domain here: a claimant's globs are matched first, first-match-wins
# over roster order; the default's globs are evaluated only after every
# claimant has failed to match. Exactly one entry carries `default: true`.
# Entries with `scope: maintainer-only` are wrapped in the marker comments
# below and stripped from the adopter bundle at release time, so an adopter
# clone audits only adopter-scope surfaces.
auditors:
  - name: code-audit-frontend
    globs:
      - "app/**"
      - "test/**"
      - ".storybook/**"
      - ".github/workflows/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig*.json"
      - "*.config.ts"
      - "*.config.mts"
      - "*.config.mjs"
      - "*.config.cjs"
      - "*.config.js"
    scope: adopter
    push_fixes: true
    default: true
  - name: code-audit-github-workflows
    globs:
      - ".github/workflows/*.yml"
      - ".github/workflows/*.yaml"
      - ".github/actions/**/*.yml"
      - ".github/actions/**/*.yaml"
    scope: adopter
    push_fixes: false
  # gaia:maintainer-only:start
  - name: code-audit-maintainer-shell
    globs:
      - ".gaia/**/*.sh"
      - ".gaia/**/*.bats"
      - ".claude/hooks/**/*.sh"
      - ".specify/extensions/gaia/lib/*.sh"
      - ".github/**/*.sh"
      - ".github/**/*.bats"
      # The husky hooks are extensionless POSIX shell, so no *.sh glob reaches
      # them. .husky/pre-commit is the Quality Gate floor for every commit, so
      # it gets the shell lens and the shellcheck oracle like any other script.
      - ".husky/**"
      - ".gaia/audit-ci.yml"
      - ".gaia/VERSION"
      - ".claude/agents/code-audit-*.md"
      - ".claude/rules/**"
    scope: maintainer-only
    push_fixes: false
  - name: code-audit-maintainer-node
    globs:
      - ".gaia/cli/src/**/*.ts"
      - ".gaia/cli/src/**/*.tmpl"
      - ".gaia/cli/src/**/*.snap"
      - ".gaia/cli/src/**/.gitkeep"
      # The CLI build/config surface beside src/: the bundle build scripts and
      # runtime deps (package.json), the resolved dependency tree
      # (pnpm-lock.yaml), and the build config (tsconfig*.json). Without these a
      # change to any merges with no code-audit review.
      - ".gaia/cli/package.json"
      - ".gaia/cli/pnpm-lock.yaml"
      - ".gaia/cli/tsconfig*.json"
    scope: maintainer-only
    push_fixes: false
  - name: code-audit-maintainer-prose
    globs:
      - ".claude/skills/**/*.md"
    scope: maintainer-only
    push_fixes: false
  # gaia:maintainer-only:end
