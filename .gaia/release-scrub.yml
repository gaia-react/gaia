# Bundle-time scrub config. Consumed by `gaia-maintainer release scrub <staging-dir>`
# from inside `release.yml` between staging and tarball creation.
#
# Three transforms run in order against the staging tree:
#
#   1. marker-strip: remove maintainer-only blocks delimited by HTML
#      comment markers from in-scope markdown files.
#
#   2. json-strip: delete maintainer-only keys from structured JSON files.
#      Keys use dot-notation to address nested paths (e.g. "scripts.foo").
#      Dots are path separators; a literal dot inside a key name is escaped
#      as `\.` (e.g. "exports.\./feature"). Missing keys are silently skipped
#      (no error). Runs after marker-strip so leak-check sees the already-
#      clean JSON.
#
#   3. leak-check: run codified audit patterns against the post-strip
#      staging tree. Non-empty match = build failure with a leak report.
#      Mirrors the patterns in `.claude/rules/wiki-style.md` Audit section
#      and `.gaia/cli/health/taxonomy.md` Distribution boundary classes.
#
# Path globs use `*` (single segment) and `**` (any depth). Globs match
# repo-relative paths under the staging directory.
#
# This file is itself maintainer-only (release-exclude category 5).
# Adopters never run `gaia-maintainer release scrub`.

transforms:
  - type: marker-strip
    paths:
      - "wiki/**/*.md"
      - ".claude/**/*.md"
      - ".specify/extensions/gaia/**/*.md"
    start: "<!-- gaia:maintainer-only:start -->"
    end: "<!-- gaia:maintainer-only:end -->"

  # .prettierignore carries maintainer-only globs for byte-sensitive test
  # fixtures under .gaia/tests/ (release-excluded; absent on adopter machines).
  # Distinct #-comment markers because .prettierignore is not markdown and
  # HTML-comment markers would read as literal ignore globs there.
  - type: marker-strip
    paths:
      - ".prettierignore"
    start: "# gaia:maintainer-only:start"
    end: "# gaia:maintainer-only:end"

  # Maintainer-only package.json keys that must not reach adopter projects.
  # bin: registers the gaia CLI binary, only meaningful when a package is
  #   published and installed as a dependency; adopters build apps, not
  #   publishable packages.
  # scripts.test:forensics: runs GAIA's internal BATS suite against
  #   .gaia/tests/forensics/unit.bats, which is release-excluded and does
  #   not exist on adopter machines.
  - type: json-strip
    paths:
      - "package.json"
    keys:
      - "bin"
      - "scripts.test:forensics"

  - type: leak-check
    checks:
      # ---- UAT-NNN narrative refs (working-doc identifiers) ----
      - id: uat-narrative
        description: "UAT-NNN narrative references in shipped instruction surfaces"
        pattern: "UAT-[0-9]{3}"
        scope:
          - ".claude/skills/**"
          - ".claude/commands/**"
          - ".claude/agents/**"
          - ".claude/rules/**"
          - ".claude/hooks/**"
          - ".specify/extensions/gaia/README.md"
          - ".specify/extensions/gaia/commands/**"
          - ".specify/extensions/gaia/lib/**"
          - ".specify/extensions/gaia/rules/**"
          - ".specify/extensions/gaia/templates/**"
        path-allowlist:
          # The rule itself names concrete IDs to teach adopters what NOT
          # to write.
          - ".claude/rules/wiki-style.md"
          # The wiki-lint playbook's documentation describes what its audit
          # flags, with concrete-ID examples by design.
          - ".claude/skills/gaia/references/wiki/lint.md"
        # Lines matching ANY of these regexes are exempt. Structural matches
        # only; see `.claude/rules/wiki-style.md` Exceptions for the contract.
        line-allowlist:
          # Identifier fragments inside variable names: uat_id, uats_block,
          # seen_uat_files, --uat-id CLI flag form.
          - "uat[-_]id|uats_block|seen_uat_files"
          # Filename literals like uat-001.spec.ts.
          - "uat-[0-9]+\\.spec\\.[a-z]+"
          # Frontmatter-style fixture: `uat_id: 'UAT-099'` or `uat_id: UAT-099`.
          - "uat_id\\s*[:=]\\s*['\"]?UAT-"

      # ---- Concrete maintainer SPEC IDs ----
      - id: spec-concrete-ids
        description: "Concrete maintainer SPEC IDs in shipped instruction surfaces"
        pattern: "\\bSPEC-00[1-9]\\b"
        scope:
          - ".claude/skills/**"
          - ".claude/commands/**"
          - ".claude/agents/**"
          - ".claude/rules/**"
          - ".claude/hooks/**"
          - ".specify/extensions/gaia/README.md"
          - ".specify/extensions/gaia/commands/**"
          - ".specify/extensions/gaia/lib/**"
          - ".specify/extensions/gaia/rules/**"
          - ".specify/extensions/gaia/templates/**"
        path-allowlist:
          # The rule itself names concrete IDs to teach adopters what NOT to
          # do. Self-referential prose is the rule's body.
          - ".claude/rules/wiki-style.md"
          # The wiki-lint playbook's documentation cites concrete-ID
          # examples that mirror the audit findings it surfaces.
          - ".claude/skills/gaia/references/wiki/lint.md"
        line-allowlist:
          # Illustrative usage in CLI/SPEC docs: `(e.g. SPEC-002)` or
          # `(e.g. \`SPEC-002\`)` (with optional backticks around the ID).
          - "e\\.g\\.\\s*`?SPEC-00[1-9]"

      # ---- Release-excluded paths leaked into shipped surfaces ----
      - id: maintainer-paths
        description: "Release-excluded paths referenced in shipped surfaces"
        pattern: "\\.gaia/cli/src/|\\.gaia/cli/test-fixtures/|\\.gaia/cli/__tests__/|\\.gaia/cli/health/|\\.specify/extensions/gaia/test/|\\.specify/specs/|\\.gaia/tests/|\\.gaia/scripts/tests/|\\.github/audit/tests/|\\.claude/rules/_internal/"
        scope:
          - "CLAUDE.md"
          - ".claude/**"
          - "wiki/**"
          - ".gaia/statusline/**"
          # Backstop for the .prettierignore marker-strip above: if a future
          # maintainer-only fixture glob lands outside the markers, its
          # .gaia/tests/ reference survives the strip and trips this check.
          - ".prettierignore"
          # Adopter-shipped CI workflows (release.yml + cli-tests.yml are
          # release-excluded; tests.yml + chromatic.yml ship). Prior
          # occurrence: tests.yml body comment cited maintainer paths
          # (98f7a62).
          - ".github/workflows/**"
          # Adopter-shipped workflow templates rendered by `gaia automation
          # render-workflows`. Template comments must not reference
          # maintainer-only paths (.gaia/cli/src/) absent on adopter machines.
          - ".gaia/cli/templates/**"
          - ".specify/extensions/gaia/README.md"
          - ".specify/extensions/gaia/commands/**"
          - ".specify/extensions/gaia/lib/**"
          - ".specify/extensions/gaia/rules/**"
          - ".specify/extensions/gaia/templates/**"
        path-allowlist:
          # Self-referential: the rule's body cites the audit greps it
          # codifies, including the maintainer-only `.gaia/tests/` scope.
          - ".claude/rules/wiki-style.md"
          # Self-referential: the lint playbook's documentation describes
          # the same audit greps and target paths.
          - ".claude/skills/gaia/references/wiki/lint.md"
          # Documents the smoke-harness convention split between
          # `.specify/extensions/gaia/test/` (UAT runbooks) and
          # `.gaia/tests/smoke/` (release-gate harnesses); literal paths
          # are the rule's classification table, not stray references.
          - ".specify/extensions/gaia/rules/smoke.md"
          # Telemetry concept page describes maintainer architecture
          # (`.gaia/cli/src/`) by design; the framing line caveats it.
          # Allowlisted by the audit taxonomy.
          - "wiki/concepts/Telemetry.md"
          # Adopter-owned sentinels that ship in the tarball but contain
          # release-baseline content after `gaia-maintainer release scrub-wiki`
          # (Step 8 of `/gaia-release`). Local simulations against
          # mid-development hot/log content would otherwise false-positive.
          - "wiki/hot.md"
          - "wiki/log.md"

      # ---- Sibling-monorepo path prefixes ----
      - id: monorepo-prefix
        description: "Maintainer monorepo siblings (studio/, website/) in shipped surfaces"
        pattern: "(?:^|[\\s`(/])(studio|website)/"
        scope:
          - "CLAUDE.md"
          - ".claude/**"
          - "wiki/**"
          - ".specify/extensions/gaia/README.md"
          - ".specify/extensions/gaia/commands/**"
          - ".specify/extensions/gaia/lib/**"
          - ".specify/extensions/gaia/rules/**"
          - ".specify/extensions/gaia/templates/**"
        path-allowlist:
          # release-notes skill is release-excluded (category 1); its
          # ../website/ references are maintainer-only and never ship.
          - ".claude/skills/release-notes/SKILL.md"
          # Same hot/log carve-out as maintainer-paths; they get
          # release-baseline content via `gaia-maintainer release scrub-wiki`.
          - "wiki/hot.md"
          - "wiki/log.md"

      # ---- Absolute filesystem literals ----
      - id: absolute-paths
        description: "Absolute /Users or /home filesystem paths in shipped Claude files"
        pattern: "/Users/|/home/"
        scope:
          - ".claude/**"
        path-allowlist:
          # The rule's own counter-example prose documents this pattern.
          - ".claude/rules/instruction-files.md"
          # Forensics redaction documents Rule B's regex literally; the
          # pattern `/Users/<name>/` and `/home/<name>/` is the load-bearing
          # algorithm input the skill executes against. Removing the literal
          # would break the documentation's correspondence to the regex.
          - ".claude/skills/gaia/references/forensics/redaction.md"

      # ---- Obscurity-rule contract: rule-name leakage ----
      # The mentorship-display rule is projected into per-machine user
      # memory precisely so Claude is told *what not to do* without
      # signposting either the contract or the artifact location. Naming
      # the rule on any shared / adopter-shipped surface defeats it.
      # Tighter than the taxonomy's reference grep (`mentorship.*display`)
      # to avoid the known false positive on the "displayable aggregates"
      # phrasing in `wiki/concepts/Telemetry.md`.
      - id: obscurity-rule-name
        description: "Obscurity contract: mentorship-display rule named in shipped surfaces"
        pattern: "mentorship[- ]display rule|raw mentorship|mentorship events?\\s+(file|path)|Claude must not display"
        scope:
          - "CLAUDE.md"
          - ".claude/**"
          - "wiki/**"
          - ".gaia/statusline/**"
        path-allowlist:
          # Adopter-owned sentinels carry release-baseline content after
          # `gaia-maintainer release scrub-wiki`; same carve-out as maintainer-paths.
          - "wiki/hot.md"
          - "wiki/log.md"

      # ---- Obscurity-rule contract: protected-path leakage ----
      # Naming the protected event-file path or feedback-memory file in
      # shared surfaces is path-leakage that draws attention to the
      # artifact location.
      - id: obscurity-protected-path
        description: "Obscurity contract: mentorship event-file paths or feedback memory file named in shipped surfaces"
        pattern: "telemetry/mentorship/events|events-[^/[:space:]]*\\.jsonl|feedback_mentorship_display\\.md"
        scope:
          - "CLAUDE.md"
          - ".claude/**"
          - "wiki/**"
          - ".gaia/statusline/**"
        path-allowlist:
          - "wiki/hot.md"
          - "wiki/log.md"

      # ---- Obscurity-rule contract: CLI subcommand-name leakage ----
      # The `_internal-assert-display-rule` subcommand was renamed to
      # `_internal-assert-memory-rules` in the 10th audit precisely to
      # remove the path/contract signposting. The old name must not
      # reappear in shared surfaces. (The bundled `gaia` binary contains
      # source strings verbatim; this is a different surface, exempt by
      # the "Decided / not findings" entry.)
      - id: obscurity-cli-subcommand
        description: "Obscurity contract: deprecated CLI subcommand name in shipped surfaces"
        pattern: "_internal-assert-display-rule"
        scope:
          - ".claude/**"

      # ---- Maintainer-only governance files at staging root ----
      # Release-exclude category 11 keeps these out of the staging tree.
      # If the exclude lines are reverted by mistake, the files would
      # silently ship and adopters would inherit GAIA's governance. Using
      # `.*` as the pattern means any line (including the empty file
      # `LICENSE`) triggers a leak; file presence is the signal.
      - id: governance-files
        description: "Maintainer governance files present at staging root"
        pattern: ".*"
        scope:
          - "CHANGELOG.md"
          - "CODE_OF_CONDUCT.md"
          - "CONTRIBUTING.md"
          - "LICENSE"
          - "README.md"
          - "SUPPORTERS.md"

      # ---- Wikilinks resolving to release-excluded slugs ----
      # Marker-strip catches blocks the maintainer wraps with
      # gaia:maintainer-only markers. This check defends the case where
      # the maintainer forgets to wrap a wikilink whose target is
      # release-excluded; the link survives the strip but resolves to
      # nothing on the adopter side.
      #
      # `derive: excluded-slugs` builds the excluded-slug set at scan time
      # from `.gaia/release-exclude`, resolved against the source repo (that
      # file excludes itself, so it never reaches the staging tree the other
      # checks scan). Every `.md` exclude contributes its slug; every
      # bare-directory exclude (wiki/entities, wiki/meta) contributes the
      # directory slug plus the slug of each page beneath it, so entity pages
      # and the dated audit artifacts under wiki/meta/ (consolidate-report-*,
      # lint-report-*, staleness-audit-*) are covered without enumeration.
      # Matching is case-insensitive and alias/anchor-aware. A newly excluded
      # page is caught with no edit here; the set cannot drift from the
      # manifest.
      - id: wikilink-to-excluded
        description: "Wikilinks pointing at release-excluded wiki slugs"
        derive: excluded-slugs
        scope:
          - "wiki/**/*.md"
        path-allowlist:
          - "wiki/hot.md"
          - "wiki/log.md"

      # ---- Workflow paths-filter denylist syntax ----
      # `paths-ignore:` and inverted `!pattern` entries fail quiet: a new
      # top-level path added to the repo silently passes the filter and
      # the workflow runs (or skips) when it shouldn't. Allowlists fail
      # loud (skip when expected to run) and are the only safe shape.
      # Prior occurrences: chromatic.yml + tests.yml denylists missed
      # `.gaia/`, `.specify/`, `studio/` (a8a4b75, c6eeecc).
      - id: workflow-denylist
        description: "Workflow paths-ignore or inverted !pattern entries: denylists fail quiet"
        pattern: "^\\s*paths-ignore\\s*:|^\\s*-\\s*['\"]?!"
        scope:
          - ".github/workflows/**"

      # ---- Runtime-optional dependency references ----
      # Hook scripts that reference .gaia/ config files guarded by `[ -f ]`
      # are runtime-optional; adopters without the file get a graceful no-op.
      # The runtime-deps checker cannot infer conditionality from shell guard
      # syntax and flags these as missing dependencies.
      - id: runtime-deps
        description: "Runtime-optional .gaia/ config references guarded by shell [ -f ] checks"
        pattern: "\\.gaia/automation\\.json"
        scope:
          - ".claude/hooks/**"
        line-allowlist:
          # In .claude/hooks/lib/gaia-ci-defer.sh: a variable assignment guarded
          # by `[ -f "$config_path" ] || return 0`, so adopters without
          # .gaia/automation.json get a graceful no-op.
          - "local config_path=.*\\.gaia/automation\\.json"
          # In .claude/hooks/lib/gaia-ci-defer.sh: shell comment lines documenting
          # the .gaia/automation.json config file in prose, not runtime refs.
          - "#.*\\.gaia/automation\\.json"
