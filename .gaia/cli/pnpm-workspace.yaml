# Marks .gaia/cli as its own pnpm workspace root. Without this, the repo-root
# pnpm-workspace.yaml (added for supply-chain hardening) makes pnpm treat the
# whole repo as one workspace and `pnpm -C .gaia/cli install` installs the root
# project instead of this standalone maintainer CLI. pnpm resolves the nearest
# pnpm-workspace.yaml, so this keeps .gaia/cli's own pnpm-lock.yaml and
# node_modules isolated. Maintainer-only; release-excluded.

# Build-script approval. pnpm 11 replaces the onlyBuiltDependencies allowlist
# with the allowBuilds map (true = the package may run install/build scripts).
# esbuild builds a native binary in its postinstall; without this, the
# --frozen-lockfile install fails with ERR_PNPM_IGNORED_BUILDS.
allowBuilds:
  esbuild: true
  unrs-resolver: true

# @gaia-react/lint bundles plugins for surfaces this CLI omits (storybook,
# better-tailwindcss, react/react-dom); their peers are absent from this
# CLI-only workspace. Pin peer mismatches as warnings, not install failures,
# for parity with the root workspace's explicit setting.
strictPeerDependencies: false
